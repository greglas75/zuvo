faq:
  - q: "What does zuvo:worktree do in CREATE mode?"
    a: "It creates a git worktree on a new branch, ensures the directory is covered by .gitignore, runs dependency installation for the detected package manager, and verifies a green test baseline — all in one step. The result is a ready-to-work isolated environment with a known clean state."
  - q: "How is zuvo:worktree different from running git worktree add manually?"
    a: "Manual git worktree skips gitignore coverage, dependency setup, and baseline verification. /worktree automates all 3, handles 10 package managers, reports pre-existing test failures before you start work, and provides a structured FINISH workflow with 4 completion options including PR creation."
  - q: "How long does zuvo:worktree CREATE take?"
    a: "Typically under 60 seconds: branch creation is instant, dependency install matches your package manager speed (npm ci on a cached node_modules is under 10 seconds), and baseline test run time depends on your suite size."
  - q: "What happens if I have uncommitted changes when I run FINISH?"
    a: "All 4 FINISH options are blocked until uncommitted changes are resolved. /worktree will report the uncommitted file count and ask you to commit or stash before proceeding. This prevents accidental work loss across all completion paths."
  - q: "Can zuvo:worktree push to a protected main branch?"
    a: "No — a safety rule prevents creating a worktree directly on main or master without explicit typed confirmation. Force-push is also blocked regardless of branch. For normal feature branches, Option 2 (Push+PR) pushes and opens a PR without force-pushing."

arguments:
  - flag: "(no arguments)"
    description: "Auto-detect mode: CREATE if in main checkout, FINISH if already inside a worktree."
  - flag: "create"
    description: "Explicitly run CREATE mode regardless of current directory."
  - flag: "finish"
    description: "Explicitly run FINISH mode. Prompts for completion option (Merge/PR/Keep/Discard)."

