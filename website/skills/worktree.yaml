when_to_use: |
  Use `/worktree` at the start of a plan execution (`zuvo:execute`) to isolate work from the main
  checkout, before any risky refactor spanning multiple files, or whenever you want a clean environment
  to verify a green baseline before modifying code. Also use it to cleanly wrap up work — push a PR,
  merge locally, or discard an experiment.

when_not_to_use: |
  For executing an implementation plan itself, use `zuvo:execute` — `/worktree` only sets up the
  isolation environment. For branch strategy decisions or multi-repo workflows, use `zuvo:architecture`.
  For small single-file changes where isolation overhead is unnecessary, work directly on your branch.

