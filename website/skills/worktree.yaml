problem: |
  Working directly on a branch in the main checkout risks contaminating ongoing work with experimental
  changes, and makes it hard to switch context cleanly. Git worktrees solve this by placing each branch
  in its own directory — but setting one up correctly (gitignore, dependency install, baseline tests)
  takes multiple manual steps that are easy to skip. `/worktree` automates the full CREATE-to-FINISH
  lifecycle with safety checks at every step.

how_it_works:
  - step: "Mode Detection"
    description: "Automatically detects whether the current directory is inside a worktree (FINISH) or the main checkout (CREATE). Respects explicit user override."
  - step: "CREATE — Directory + gitignore"
    description: "Checks for an existing .worktrees/ convention or CLAUDE.md preference. Adds the worktree directory to .gitignore if not already covered and commits the change."
  - step: "CREATE — Branch + Setup"
    description: "Creates the worktree on a new branch, then auto-detects the dependency system (10 package managers supported) and runs the appropriate install command."
  - step: "CREATE — Baseline Verification"
    description: "Runs the project's test suite to establish a green baseline. Reports pass/fail count. Pre-existing failures are surfaced before any work begins."
  - step: "FINISH — State Summary"
    description: "Reports branch name, commits ahead of base, and uncommitted changes. Blocks all finish options if uncommitted changes exist."
  - step: "FINISH — Completion"
    description: "User selects 1 of 4 options: Merge Locally (runs tests, merges, removes worktree), Push+PR (pushes, creates gh pr, removes worktree), Keep As-Is (preserves everything), or Discard (requires typed confirmation)."

output:
  artifact: "No file artifact — worktree lifecycle managed in-place"
  format: "Structured status report printed after CREATE and after each FINISH option. Source files modified only by Merge (git merge) or Discard (worktree + branch deletion)."
  sections:
    - "Worktree path, branch, base branch, short hash"
    - "Dependency setup result"
    - "Baseline test pass/fail count"
    - "FINISH state summary (commits ahead, clean/dirty)"
    - "Completion report (merge result, PR URL, or preserved path)"

