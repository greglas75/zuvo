problem: |
  Test suites degrade silently. Files accumulate tautological mocks that test nothing, copy-pasted fixtures with no assertions, and branches that are never exercised — all while the test count climbs and coverage percentages look healthy. When something breaks, these tests give no signal. `zuvo:test-audit` pairs each test file with its production source, checks every public method for coverage, and assigns a tier so you know exactly which tests are worth keeping and which need a rewrite.

how_it_works:
  - step: "Discovery and pairing"
    description: "The skill locates all test files, pairs each with its production source by path convention or symbol lookup, and flags orphan tests (test files with no matching production file)."
  - step: "Red-flag pre-scan"
    description: "Before the full checklist, each batch agent scans for instant Tier-D triggers: zero expect() calls (AP13), fixture:assertion ratio >20:1 (AP16), and 50%+ tests using toBeTruthy()/toBeDefined() as sole assertion (AP14)."
  - step: "Production code analysis"
    description: "The agent reads the production file to extract the public API surface, branch map, error handling points, and complexity class (THIN/STANDARD/COMPLEX). This sets the expected test count and edge case scope."
  - step: "Q1-Q17 evaluation"
    description: "Every applicable gate is scored binary (1/0). Phantom mock detection runs in parallel: each mocked module is checked against what the production code actually calls."
  - step: "Aggregate and coverage registry"
    description: "Results roll up to a tier distribution, critical gate failure table, and untested method inventory. The coverage registry (memory/coverage.md) is updated and findings are persisted to the backlog."

output:
  artifact: "audits/test-quality-audit-YYYY-MM-DD.md"
  format: "Markdown report with tier distribution, critical gate failures, untested public methods, anti-pattern hotspots, and per-file score blocks."
  sections:
    - "Summary by Tier (A/B/C/D and ORPHAN counts)"
    - "Critical Gate Failures (Q7/Q11/Q13/Q15/Q17)"
    - "Red Flag Summary (Auto Tier-D)"
    - "Untested Public Methods"
    - "Top Failed Questions (frequency ranking)"
    - "Anti-pattern Hot Spots"
    - "Per-file detail blocks"

examples:
  - title: "Audit all tests in quick mode"
    type: invocation
    command: "zuvo:test-audit all --quick"
    result: "Scans every test file, pairs each with its source, and returns tier distribution plus top failing gates in ~2 minutes for 50 files. No per-gate evidence."
  - title: "Deep audit on a single test file"
    type: invocation
    command: "zuvo:test-audit src/services/order.test.ts"
    result: "Full Q1-Q17 evidence with phantom mock list, untested methods, and a fix plan for the specific file."
  - title: "Tautological mock — AP10 auto-detected"
    type: before_after
    gate: "AP10"
    before:
      language: typescript
      code: |
        it("calls the logger", async () => {
          const logSpy = vi.fn();
          await processOrder({ logger: logSpy }, orderId);
          expect(logSpy).toHaveBeenCalled();
        });
    after:
      language: typescript
      code: |
        it("logs order ID after processing", async () => {
          const logSpy = vi.fn();
          const result = await processOrder({ logger: logSpy }, "ord_123");
          expect(result.status).toBe("processed");
          expect(logSpy).toHaveBeenCalledWith("order processed", { orderId: "ord_123" });
        });
    explanation: "AP10 is a tautological mock: the test calls a mock and only verifies the mock was called, with no assertion on production output. The fix adds a behavioral assertion (result.status) and a CalledWith check on the exact arguments."

when_to_use: "Run `zuvo:test-audit` after mass test writing, when test failures are hard to diagnose, before a release, or when coverage numbers look healthy but regressions keep slipping through. Use `--quick` for a fast sweep and `--deep` when you need the full evidence trail."

when_not_to_use: "For writing new tests for untested code, use `zuvo:write-tests`. For fixing the same anti-pattern across many test files in batch, use `zuvo:fix-tests` — it is designed to repair a specific pattern (e.g., AP10 across 30 files) rather than diagnose. For single-file PR review, use `zuvo:review`."

