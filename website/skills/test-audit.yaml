faq:
  - q: "What does zuvo:test-audit check that code coverage tools don't?"
    a: "Coverage tools report which lines were executed. zuvo:test-audit checks whether tests actually verify computed output (Q17), exercise error paths (Q7), use exact matchers (Q4), and avoid tautological mocks that execute code without asserting behavior (AP10). A file can have 100% line coverage and still score Tier D."
  - q: "How is zuvo:test-audit different from zuvo:fix-tests?"
    a: "zuvo:test-audit diagnoses the quality of your test suite across all 17 gates and 26 anti-patterns, then produces a tiered report. zuvo:fix-tests takes a specific anti-pattern (e.g., AP10 tautological mocks) and batch-repairs it across all affected files. Audit first, then fix."
  - q: "How long does a test audit take?"
    a: "Quick mode processes ~50 test files in about 2 minutes. Deep mode with full evidence takes roughly 10 minutes for the same scope. The skill auto-switches to quick if file count exceeds 50 and --deep was not specified."
  - q: "Can zuvo:test-audit handle E2E test files?"
    a: "E2E tests are excluded by default (*/e2e/*, *.e2e.*) because Q1-Q17 were designed for unit and integration tests. Pass --include-e2e to include them; expect some gates to be N/A for pure smoke tests."
  - q: "What is a phantom mock?"
    a: "A phantom mock is a module mocked in the test that the production code under test never actually calls. Phantom mocks add noise to test setup, create false confidence, and break when the real import path changes. The audit lists all phantom mocks per file in the report."

arguments:
  - flag: "all"
    description: "Audit every test file in the project"
  - flag: "[path]"
    description: "Audit test files under a specific directory"
  - flag: "[file]"
    description: "Audit a single test file with full evidence (forces deep mode)"
  - flag: "--deep"
    description: "Collect evidence and fix recommendations for every file"
  - flag: "--quick"
    description: "Binary pass/fail only, skip evidence; auto-enabled for >50 files"
  - flag: "--include-e2e"
    description: "Include E2E test files in scope (excluded by default)"
  - flag: "--details"
    description: "Save per-file reports to audits/test-audit-details/"
  - flag: "--commit=ask|auto|off"
    description: "Commit behavior after the optional post-audit fix workflow (default: ask)"

checks:
  sections:
    - name: "Quality Gates"
      id_range: "Q1-Q17"
      count: 17
      items:
        - id: "Q7"
          name: "At least one error path test present"
          critical: true
        - id: "Q11"
          name: "All code branches exercised"
          critical: true
        - id: "Q13"
          name: "Tests import actual production function (not a stub)"
          critical: true
        - id: "Q15"
          name: "Content/value assertions present — not just shape or count"
          critical: true
        - id: "Q17"
          name: "Assertions verify computed output, not input echo"
          critical: true
        - id: "Q3"
          name: "Every mock has CalledWith and not.toHaveBeenCalled checks"
          critical: false
        - id: "Q4"
          name: "Assertions use exact matchers (toEqual/toBe, not toBeTruthy)"
          critical: false
        - id: "Q6"
          name: "Mock state is fresh per test — beforeEach reset, no shared mutable state"
          critical: false
    - name: "Anti-Patterns"
      id_range: "AP1-AP26"
      count: 26
      items:
        - id: "AP13"
          name: "Test with zero expect() calls — AUTO TIER-D"
          critical: true
        - id: "AP16"
          name: "Fixture:assertion ratio greater than 20:1 — AUTO TIER-D"
          critical: true
        - id: "AP14"
          name: "toBeTruthy()/toBeDefined() as sole assertion on complex object — AUTO TIER-D"
          critical: true
        - id: "AP10"
          name: "Tautological mock — calls mock, verifies mock called, no production output check"
          critical: false
        - id: "AP26"
          name: "Real timers in time-dependent tests without useFakeTimers"
          critical: false
        - id: "AP2"
          name: "Conditional assertions (if/else inside test body)"
          critical: false

frameworks:
  - TypeScript
