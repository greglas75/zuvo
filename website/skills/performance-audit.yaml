faq:
  - q: "What does zuvo:performance-audit check?"
    a: "It checks 12 dimensions: rendering performance, bundle size, asset optimization, API/network patterns, algorithm complexity, memory management, database queries (N+1, unbounded), caching strategy, framework-specific patterns, Web Vitals (LCP/INP/CLS), backend runtime (sync I/O), and concurrency (fan-out limiting). Each dimension has a weighted score and D7 is a critical gate."
  - q: "How is performance-audit different from db-audit?"
    a: "zuvo:performance-audit covers the full stack with D7 providing a focused N+1 and unbounded-query check. zuvo:db-audit goes deeper on the database layer: 60+ checks across 12 dimensions including indexes, schema design, connection pooling, migrations, and ORM-specific patterns. Run performance-audit first; use db-audit when D7 findings need deeper investigation."
  - q: "How long does a performance-audit take?"
    a: "Code inspection (PARTIAL tier) completes in a few minutes. A FULL audit with Lighthouse and bundle analyzer may take 5-15 minutes depending on project size. The `--frontend` or `--backend` flags cut scope in half. Monorepo projects use Profile E and audit each package individually."
  - q: "Does performance-audit auto-fix issues?"
    a: "No — the audit is strictly read-only. It produces findings with Impact Models and a prioritized roadmap. For CRITICAL findings, it recommends the next action (e.g., `zuvo:refactor [file]` for D11 sync I/O). The fix step is intentionally separate to keep audit results verifiable."
  - q: "What frameworks and languages are supported?"
    a: "Frontend: Next.js, Vite/React, SvelteKit, Vue, Angular. Backend: NestJS, Express, FastAPI, Gin. ORMs: Prisma, TypeORM, SQLAlchemy, Mongoose. Deployment: Serverless (Vercel/Netlify), Cloudflare Workers, containers, AWS Lambda. Framework-specific pathologies are detected per stack in D9."

arguments:
  - flag: "(empty) or full"
    description: "Full audit across all applicable dimensions for the entire project"
  - flag: "[path]"
    description: "Scope the audit to a specific directory or module"
  - flag: "[file]"
    description: "Deep single-file audit focused on algorithms, memory, and complexity"
  - flag: "--frontend"
    description: "Dimensions D1-D3 and D10 only (rendering, bundles, assets, Web Vitals)"
  - flag: "--backend"
    description: "Dimensions D4-D5 and D7-D8, D11-D12 only (API, algorithms, DB, caching, runtime, concurrency)"
  - flag: "--db"
    description: "Dimension D7 only — database queries and schema patterns"
  - flag: "--bundle"
    description: "Dimension D2 only — bundle weight analysis"

checks:
  sections:
    - name: "Rendering Performance"
      id_range: "D1"
      count: 4
      items:
        - id: "D1-1"
          name: "Unnecessary re-renders"
          critical: false
        - id: "D1-2"
          name: "Virtualization for large lists"
          critical: false
        - id: "D1-3"
          name: "Route-level code splitting"
          critical: false
        - id: "D1-4"
          name: "Server components for data fetching"
          critical: false
    - name: "Bundle Size"
      id_range: "D2"
      count: 4
      items:
        - id: "D2-1"
          name: "Total JS bundle under 200 KB gzipped"
          critical: true
        - id: "D2-2"
          name: "Tree shaking enabled"
          critical: false
        - id: "D2-3"
          name: "No duplicate dependencies"
          critical: false
        - id: "D2-4"
          name: "Dynamic imports for heavy features"
          critical: false
    - name: "Database Performance"
      id_range: "D7"
      count: 4
      items:
        - id: "D7-1"
          name: "No N+1 queries in hot paths"
          critical: true
        - id: "D7-2"
          name: "Unbounded queries have LIMIT"
          critical: true
        - id: "D7-3"
          name: "Index coverage on filter/sort columns"
          critical: false
        - id: "D7-4"
          name: "Connection pooling configured"
          critical: false
    - name: "Web Vitals"
      id_range: "D10"
      count: 3
      items:
        - id: "D10-1"
          name: "LCP < 2.5s"
          critical: false
        - id: "D10-2"
          name: "INP < 200ms"
          critical: false
        - id: "D10-3"
          name: "CLS < 0.1"
          critical: false

