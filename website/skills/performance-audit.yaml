problem: |
  Performance problems in production are rarely obvious from code review alone.
  A slow API call, an N+1 query, or a 600 KB JavaScript bundle each degrade user
  experience in different ways and require different fixes. Without structured
  measurement and Impact Models, teams optimize the wrong things — spending hours
  on low-value micro-optimizations while critical database bottlenecks go unnoticed.
  zuvo:performance-audit provides a systematic, evidence-based analysis across the
  entire stack, so every optimization decision is backed by data.

how_it_works:
  - step: "Stack Detection and Profile Selection"
    description: "Detects frontend framework, bundler, backend runtime, ORM, and deployment model. Selects one of 5 audit profiles (A-E) to activate the right dimensions for the project."
  - step: "Hot Path Identification"
    description: "Discovers API handlers, page components, middleware, and queue workers. Ranks entry points by expected traffic so analysis focuses on code that actually matters."
  - step: "12-Dimension Analysis"
    description: "Dispatches 3 parallel agents (Frontend, Backend, Data Layer) when supported. Each dimension scored 0 to its max weight. D7 is a critical gate: a score of 0 triggers an audit FAIL."
  - step: "Impact Model Generation"
    description: "Every finding above LOW severity gets an Impact Model: estimated savings, blast radius, effort (S/M/L), and confidence tier (HIGH requires profiler/Lighthouse data)."
  - step: "Roadmap and Backlog"
    description: "Findings sorted into Quick Wins, Short-term, Medium-term, and Long-term. HIGH+ findings are proposed as backlog entries for zuvo:backlog."

output:
  artifact: "audits/performance-audit-YYYY-MM-DD.md"
  format: "Markdown report with dimension score table, severity-sorted findings, Impact Models, cross-cutting patterns, and a prioritized optimization roadmap."
  sections:
    - "Metadata (stack, profile, audit tier)"
    - "Executive Summary with grade (A-D)"
    - "Dimension Scores (D1-D12 table)"
    - "Critical Gates"
    - "Findings sorted by priority score"
    - "Cross-Cutting Patterns"
    - "Optimization Roadmap (Quick Wins through Long-term)"
    - "Prerequisites for Higher Confidence"

examples:
  - title: "N+1 query in hot-path list endpoint"
    type: before_after
    gate: "D7"
    before:
      language: typescript
      code: |
        async listOrders(userId: string) {
          const orders = await db.order.findMany({ where: { userId } });
          for (const order of orders) {
            order.items = await db.orderItem.findMany({ where: { orderId: order.id } });
          }
          return orders;
        }
    after:
      language: typescript
      code: |
        async listOrders(userId: string) {
          return db.order.findMany({
            where: { userId },
            include: { items: true },
          });
        }
    explanation: "D7 critical gate: query inside a loop causes N+1 database calls. Eager loading with `include` reduces N+1 to a single JOIN. Impact Model: ~200ms saved per request at 100 rps."
  - title: "Impact Model output sample"
    type: output_sample
    sample:
      language: text
      code: |
        FINDING: P-D7-01 CRITICAL database — N+1 in OrderService.listOrders()
          File: src/services/order.service.ts:34
          Impact Model:
            Estimated savings: ~180ms / request (6 DB round-trips → 1)
            Blast radius:      ~1,200 requests/hour (order list page)
            Effort:            S — add `include: { items: true }` to findMany
            Confidence:        MEDIUM (heuristic, no EXPLAIN ANALYZE available)
            Priority score:    Impact / Effort = 9
    explanation: "Every HIGH+ finding includes a structured Impact Model so the team can prioritize by data, not instinct."

when_to_use: "Run before major releases, after heavy feature work, when users report slowness, or as a periodic health check (every 1-3 months). Use `--backend` or `--frontend` flags to scope to a specific layer when time is limited."

when_not_to_use: "For code correctness and style issues, use `zuvo:review` or `zuvo:code-audit`. For security vulnerabilities, use `zuvo:security-audit`. For test suite speed, use `zuvo:tests-performance`. For database schema health beyond query patterns, use `zuvo:db-audit`."

