    type: coverage
    verifiable: true
    source: "SKILL.md Phase 2 dimension table — weights sum to 100 (D1:12, D2:12, D3:8, D4:10, D5:10, D6:10, D7:12, D8:8, D9:8, D10:10, D11:6, D12:6)"
  - claim: "D7=0 (N+1 in hot path) overrides total score to FAIL regardless of other dimension scores"
    type: accuracy
    verifiable: true
    source: "SKILL.md Phase 2 D7 section — 'Critical gate: D7=0 triggers audit FAIL'"
  - claim: "4 audit confidence tiers based on available tooling: FULL, STANDARD, PARTIAL, MINIMAL"
    type: coverage
    verifiable: true
    source: "SKILL.md Phase 0.4 Audit Confidence Tier table"
  - claim: "Impact Models include 4 fields: estimated savings, blast radius, effort, and confidence level"
    type: accuracy
    verifiable: true
    source: "SKILL.md Phase 3.2 Impact Model Format"

