faq:
  - q: "What does zuvo:debug do?"
    a: "It runs a structured 5-phase investigation: (1) confirm the bug is reproducible, (2) establish a baseline and narrow the search space, (3) form and test hypotheses in order of likelihood with actual evidence, (4) apply the minimal fix and verify with targeted tests + full suite + original reproduction, (5) write a regression test and run CQ1-CQ22 on the fix and Q1-Q17 on the regression test. Phase R replaces phases 1-3 with automated git bisect for confirmed regressions."
  - q: "How does the regression bisect work?"
    a: "When --regression is passed or the issue sounds like a behavioral regression, zuvo:debug writes a minimal reproducer test that fails on HEAD, verifies it passes on a known-good commit, then runs git bisect automatically. Bisect terminates after the first bad commit is identified (guardrail: abort after 20 steps if the range is too wide). The breaking commit's diff typically makes the root cause obvious, so investigation skips straight to fixing."
  - q: "How is zuvo:debug different from just reading the code?"
    a: "zuvo:debug enforces several anti-shortcuts: it verifies a stack trace is reproducible before investigating (Phase 1.5), establishes a test baseline before applying fixes (Phase 2.0), limits hypotheses to 3 ordered by likelihood (Phase 3), and re-reads the code path from scratch if 2 hypotheses fail rather than guessing in the same direction. Most debugging time waste comes from skipping these steps."
  - q: "What quality gates apply to the debug output?"
    a: "The production fix is evaluated against CQ1-CQ22 (critical gates: CQ3, CQ4, CQ5, CQ6, CQ8, CQ14). The regression test is evaluated against Q1-Q17 (critical gates: Q7, Q11, Q13, Q15, Q17). Any critical gate failure must be fixed. Defense-in-depth additions (entry validation, business logic invariants, debug instrumentation) are applied at whichever layers are appropriate for the bug class."
  - q: "What happens when a bug is intermittent or flaky?"
    a: "zuvo:debug flags intermittent reproduction after Phase 1.5 (run 3 times to confirm flakiness) and applies the Async/Flaky diagnostic sequence in Phase 3: confirm frequency over 5 runs, check for shared mutable state between tests, check timing assumptions, check execution-order dependencies, and check resource cleanup (ports, connections, file handles). Race conditions are treated as a separate bug class from functional bugs."

arguments:
  - flag: "<error message or description>"
    description: "The bug to investigate. Accepts an error message, stack trace, code snippet, or description. Determines the starting phase automatically."
  - flag: "--regression"
    description: "Trigger Phase R (Regression Bisect) instead of the standard phases 1-3. Also auto-triggered by words like 'bisect', 'regression', or 'this used to work'."

