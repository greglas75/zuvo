problem: |
  Most debugging sessions waste time because they skip the basics: confirming the bug is reproducible before investigating, establishing a baseline before applying fixes, or testing hypotheses in order of likelihood. The result is a fix that addresses a symptom while the root cause remains. zuvo:debug enforces a structured 5-phase process that prevents this — starting from confirmed reproduction, narrowing the search space systematically, forming and testing at most 3 hypotheses, and verifying the fix against both targeted tests and the full suite. For regressions, automated git bisect finds the breaking commit so the root cause is clear from the diff.

how_it_works:
  - step: "Phase 1: Reproduce"
    description: "Establish the expected vs. actual behavior, exact reproduction steps, scope (always/intermittent/conditional), and timeline (recent deploy, config change, dependency update). Inconsistent reproduction flags potential race conditions or environment-dependent issues before investigation begins."
  - step: "Phase 1.5: Minimal Reproduction"
    description: "A stack trace proves an error happened once — it does not prove it is reproducible now. This phase verifies the error can be triggered on the current codebase. If the error cannot be reproduced, the trace may be from a different state (stale data, previous deploy). Only confirmed reproduction proceeds to Phase 2."
  - step: "Phase 2: Narrow"
    description: "Determine whether this is a new regression or pre-existing issue. Run existing tests for the affected area and record the baseline. Then reduce the search space through 5 ordered techniques: full stack trace analysis, log review, recent commit inspection (with CodeSift changed_symbols and diff_outline), environment comparison, and binary search on the code path."
  - step: "Phase 3: Diagnose"
    description: "Trace the execution path from entry point to failure using call chain analysis (CodeSift trace_call_chain and get_context_bundle). Form at most 3 hypotheses ordered by likelihood. Test each with specific evidence. If 2 hypotheses fail, re-read the code path from scratch rather than guessing in the same direction. The root cause is the specific line, condition, or assumption that fails — not a symptom."
  - step: "Phase 4: Fix and Verify"
    description: "Apply the minimal fix targeting the root cause. Run targeted tests, then the full suite compared against the Phase 2 baseline. Re-run the original reproduction to confirm it is resolved. Write a regression test that recreates the exact bug condition and would have caught it if written before the original code. Run CQ1-CQ22 on the fix and Q1-Q17 on the regression test."
  - step: "Phase R: Regression Bisect (alternative for confirmed regressions)"
    description: "When the user says 'this used to work', write a reproducer test that fails on HEAD, verify it passes on a known-good commit, then run git bisect automatically. The first bad commit is identified with up to 20 steps. After bisect, the breaking change is visible from the diff, making root cause typically obvious. Phase R joins Phase 4 for the fix and verification."

output:
  artifact: "Bug fix committed + regression test file + debug report"
  format: "A structured Debug Report with reproduction details, hypothesis table, root cause statement, fix applied, defense-in-depth additions, verification results, and the regression test. Regression bisect mode produces an additional Breaking Commit section."
  sections:
    - "Reproduction (expected / actual / steps / scope / baseline)"
    - "Diagnosis (hypothesis table with evidence and verdict)"
    - "Root Cause (file:line, 1-3 sentence explanation)"
    - "Fix Applied (before/after code)"
    - "Defense-in-Depth (guards added at which layers)"
    - "Verification (targeted / full suite / reproduction resolved / CQ / Q)"
    - "Regression Test"

examples:
  - title: "Debug report for a permission bug"
    type: output_sample
    sample:
      language: markdown
      code: |
        ## Debug Report: Order history visible across organizations

        ### Reproduction
        - **Expected:** /api/orders returns only the authenticated user's orders
        - **Actual:** Orders from all organizations are returned
        - **Steps:** GET /api/orders with valid JWT for org-A returns orders from org-B
        - **Scope:** Always — all authenticated users
        - **Baseline:** 2 passing, 1 failing (order.controller.spec.ts:89)

        ### Diagnosis
        | # | Hypothesis | Evidence | Verdict |
        |---|-----------|----------|---------|
        | 1 | Missing orgId filter in Prisma query | order.service.ts:47 — findMany with only userId | CONFIRMED |
        | 2 | Auth guard not applied to route | @UseGuards(JwtAuthGuard) present on line 12 | RULED OUT |

        **Root Cause:** order.service.findAll() filters by userId but not organizationId.
        File: src/services/order.service.ts:47

        ### Fix Applied
        ```typescript
        // Before:
        findMany({ where: { userId } })
        // After (CQ4 — auth guard + query filter defense in depth):
        findMany({ where: { userId, organizationId: orgId } })
        ```
    explanation: "The hypothesis table forces explicit evidence for each theory. CONFIRMED and RULED OUT verdicts distinguish root cause from symptoms. CQ4 is cited directly in the fix comment."

  - title: "Regression bisect invocation"
    type: invocation
    command: "zuvo:debug --regression the CSV export stopped working after last week's merge"
    result: |
      Phase R: Regression Bisect
      Writing reproducer test: __bisect_test.ts
      Reproducer confirmed failing on HEAD.
      Good commit auto-detected: HEAD~8 (test passes)
      Running git bisect start HEAD HEAD~8...
      git bisect run: npx vitest run __bisect_test.ts --reporter=verbose
      Bisect complete in 4 steps (8 commits searched).

      Breaking commit: 7d3f891 — feat: normalize order export fields
      Author: dev@example.com (2026-03-22)
      Root cause: exportFields.map() received undefined when order.metadata was null —
                  the normalization step added a null check for some fields but missed metadata.

  - title: "Defense-in-depth additions after a null crash"
    type: before_after
    before:
      language: typescript
      code: |
        // Phase 3 diagnosis: crashes when order.metadata is null
        const exportValue = order.metadata.exportConfig.fields.join(',');
    after:
      language: typescript
      code: |
        // Entry validation guard (layer 1)
        if (!order.metadata?.exportConfig?.fields?.length) {
          logger.warn('Order missing exportConfig', { orderId: order.id });
          return '';
        }
        const exportValue = order.metadata.exportConfig.fields.join(',');
    explanation: "Defense-in-depth adds guards at multiple layers after the fix. The minimal fix addresses the null crash; the entry validation guard prevents the same class of bug from propagating silently in the future."

when_to_use: |
  Use zuvo:debug for any bug, error, or unexpected behavior that needs investigation: production errors with stack traces, failing tests with unclear causes, flaky tests, behavioral regressions, performance bugs with a specific problematic operation, and permission or data isolation issues. Pass --regression or describe it as 'this used to work' to trigger automated git bisect.

when_not_to_use: |
  For broad code quality sweeps without a specific bug, use zuvo:code-audit. For general review of recently written code, use zuvo:review. For performance analysis without a specific buggy operation, use zuvo:performance-audit. For structural reorganization of working code, use zuvo:refactor. If the bug is clearly in a specific location and you already know the fix, use zuvo:build instead.

