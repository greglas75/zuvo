faq:
  - q: "What does zuvo:canary check during monitoring?"
    a: "In full mode (Playwright or Chrome DevTools available): HTTP status, console error count, page load time, and screenshots per check cycle. In degraded mode (HTTP-only): HTTP status and response time via curl. Both modes produce a HEALTHY / DEGRADED / BROKEN verdict."
  - q: "How is zuvo:canary different from zuvo:deploy's health check?"
    a: "zuvo:deploy runs a single-shot health check as the final gate of the deploy pipeline — it verifies the URL responds with HTTP 200 in under 10 seconds. zuvo:canary runs a sustained monitoring loop (1–30 minutes, configurable interval), capturing console errors and screenshots over time. Use deploy for the gate, canary for observation."
  - q: "How long does zuvo:canary run?"
    a: "Default is 10 minutes with 60-second intervals (10 checks). Configure with --duration (range 1m–30m) and --interval. Pass --quick for a single check. In non-interactive environments (Codex, Cursor), one-shot mode is forced automatically."
  - q: "Does zuvo:canary require Playwright or Chrome DevTools?"
    a: "No — it degrades gracefully. If no browser MCP tools are detected, canary runs in HTTP-only (degraded) mode using curl, which checks HTTP status and response time. Console errors and screenshots are unavailable in degraded mode."
  - q: "What happens when canary reports BROKEN?"
    a: "The CANARY COMPLETE block prints a rollback suggestion pointing to zuvo:deploy rollback and the platform-specific rollback command if a platform was detected in Phase 1. Rollback is never executed automatically — the user decides."

arguments:
  - flag: "<url>"
    description: "Production URL to monitor (REQUIRED)"
  - flag: "--duration <time>"
    description: "Monitoring duration in minutes (range: 1m–30m, default: 10m)"
  - flag: "--interval <time>"
    description: "Check interval in seconds (default: 60s)"
  - flag: "--quick"
    description: "Single health check only — no loop"
  - flag: "--max-errors <n>"
    description: "Console error count threshold for BROKEN verdict (default: 3)"

checks: null

frameworks:
  - Playwright (MCP)
  - Chrome DevTools (MCP)
  - HTTP-only (curl fallback)

modes:
  - name: full
    description: "Browser-based checks via Playwright or Chrome DevTools MCP tools. Captures HTTP status, console errors, load time, and screenshots per cycle."
  - name: degraded
    description: "HTTP-only checks via curl when no browser MCP tools are detected. HTTP status and response time only — no console errors or screenshots."
  - name: quick
    description: "One-shot mode: single check cycle, then exit. Forced in non-interactive environments (Codex, Cursor)."

agents: null

