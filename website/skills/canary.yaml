problem: |
  After a successful deploy it is easy to assume production is healthy — until users start
  reporting errors. `zuvo:canary` fills the gap between deploy completion and confident
  release sign-off by actively monitoring the production URL for console errors, slow
  responses, and HTTP failures over a configurable window. When browser tools (Playwright or
  Chrome DevTools) are available it captures screenshots and console error streams; otherwise
  it falls back to HTTP-only checks automatically.

how_it_works:
  - step: Setup
    description: Validates the required URL argument, detects whether browser MCP tools (Playwright or Chrome DevTools) are available, and parses duration/interval arguments. Forces one-shot mode in non-interactive environments.
  - step: Platform Context
    description: Optionally reads the platform detection include to surface supplementary health commands (e.g., fly status) alongside the HTTP check.
  - step: Monitoring Loop
    description: "Runs check cycles at the configured interval for the full duration. Full mode: navigate URL, check HTTP status, capture console errors, measure load time, take screenshot. Degraded mode: curl HTTP status + response time only."
  - step: Output
    description: Determines the verdict from cumulative results (HEALTHY / DEGRADED / BROKEN), compares performance against prior canary runs, and prints the CANARY COMPLETE block. Suggests zuvo:deploy rollback if BROKEN.

output:
  artifact: "audit-results/canary-{ISO-timestamp}/check-N.png (full mode only)"
  format: CANARY COMPLETE terminal block with URL, duration, check count, console error tally, avg response time, baseline comparison, and verdict.
  sections:
    - "Mode (full / degraded)"
    - "Console error and warning counts"
    - "Average response time with baseline delta"
    - "Screenshots directory (full mode)"
    - "Verdict (HEALTHY / DEGRADED / BROKEN)"
    - "Rollback suggestion (BROKEN only)"

examples:
  - title: "10-minute monitor after deploy"
    type: invocation
    command: "zuvo:canary https://myapp.com"
    result: |
      CANARY COMPLETE
        URL:         https://myapp.com
        Duration:    10m (10 checks)
        Mode:        full (Playwright available)
        Console:     0 errors, 2 warnings
        Performance: avg 0.9s (baseline: 1.1s, -18%)
        Screenshots: audit-results/canary-2026-03-29T1430/
        Verdict:     HEALTHY

  - title: "Quick single check"
    type: invocation
    command: "zuvo:canary https://myapp.com --quick"
    result: "Runs exactly 1 check cycle and exits. Useful in CI pipelines or non-interactive environments."

  - title: "30-minute monitor with custom error threshold"
    type: invocation
    command: "zuvo:canary https://myapp.com --duration 30m --max-errors 1"
    result: "Monitors for 30 minutes. Any single console error triggers a BROKEN verdict instead of the default threshold of 3."

when_to_use: |
  Run `zuvo:canary` immediately after `zuvo:deploy` reports SUCCESS to confirm production
  is stable. It is the third step of the release flow: ship → deploy → canary → release-docs
  → retro. Also useful as a standalone smoke test on any URL — no prior deploy required.

when_not_to_use: |
  Do not use `zuvo:canary` as a substitute for `zuvo:deploy`'s built-in health check — that
  check is a single-shot gate inside the deploy pipeline. `zuvo:canary` is for sustained
  post-deploy observation. For production metrics over days or weeks, use your observability
  platform (Datadog, Sentry, etc.) rather than repeated canary runs.

