  slug: canary
  title: "canary — Post-deploy Production Monitoring with Browser or HTTP Mode"
  description: "Monitor production after deploy for 1–30 minutes. Captures console errors, load time, and screenshots (browser mode). 3 verdicts: HEALTHY/DEGRADED/BROKEN."
  category: release
  og_image: /og/skills/canary.png

