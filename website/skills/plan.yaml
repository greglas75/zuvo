faq:
  - q: "What does zuvo:plan produce?"
    a: "It produces a plan document at docs/specs/YYYY-MM-DD-<topic>-plan.md. The plan contains an architecture summary, technical decisions, quality strategy, and an ordered TDD task list. Each task includes exact failing test code, minimum implementation code, a shell verification command with expected output, a commit message, a complexity rating, and dependency declarations."
  - q: "Why does zuvo:plan use 3 sequential agents instead of parallel?"
    a: "The sequential order is intentional: the Tech Lead's pattern selection must be grounded in the Architect's component boundaries, and the QA Engineer's testability assessment must be grounded in finalized technical decisions. Parallel dispatch would produce reports that contradict each other, requiring a fourth synthesis step that costs more tokens than the sequential approach."
  - q: "How long does zuvo:plan take to run?"
    a: "A typical plan for a medium feature takes 3 sequential agent runs plus plan writing and review, totaling roughly 10-20 minutes of calendar time. Complex features with many architectural decisions take longer. Each agent is budget-limited to 5000 CodeSift tokens to prevent runaway analysis."
  - q: "What if the spec is ambiguous when planning?"
    a: "zuvo:plan does not guess. If a spec section is ambiguous, it asks you to clarify before making planning decisions that depend on the answer. The CONTRACT is updated with your answers and the plan proceeds. Ambiguity discovered after planning starts is surfaced immediately rather than silently resolved."
  - q: "What frameworks and languages does zuvo:plan support?"
    a: "zuvo:plan detects the project stack from config files (tsconfig.json, package.json, pyproject.toml, composer.json) and loads the corresponding rules (TypeScript, React/Next.js, NestJS, Python). The generated task code, verification commands, and commit messages are all tailored to the detected stack and test runner."

