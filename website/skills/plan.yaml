problem: |
  An approved design spec describes what to build but not how to build it safely. Without an implementation plan, developers jump directly into code, miss dependencies between tasks, and discover architectural surprises mid-implementation. zuvo:plan bridges the gap: 3 sequential agents analyze your spec from 3 perspectives — architecture boundaries, technical pattern selection, and testability — then decompose the work into TDD tasks with exact code and verification commands. Nothing is ambiguous when implementation starts.

how_it_works:
  - step: "Hard Gate: Spec Required"
    description: "zuvo:plan searches for an approved spec at docs/specs/*-spec.md. If none exists, it automatically redirects to zuvo:brainstorm. If multiple specs exist, you choose which one to plan against. The spec is the source of truth for all planning decisions."
  - step: "Phase 1A: Architect Analysis"
    description: "The Architect agent reads the spec and maps component boundaries, data flow, interfaces, dependency graph, and produces a Mermaid architecture diagram. This report is the terrain map that subsequent agents use."
  - step: "Phase 1B: Tech Lead Analysis"
    description: "The Tech Lead agent receives the spec and the Architect's report, then selects specific patterns and libraries, makes build-vs-reuse decisions, and defines the file structure. Output is a Technical Decisions Report with trade-offs."
  - step: "Phase 1C: QA Engineer Analysis"
    description: "The QA Engineer receives all prior reports and assesses testability for each component, flags CQ risk areas, and defines the test strategy. Sequential order is mandatory — QA assessments must be grounded in finalized architecture and tech decisions."
  - step: "Phase 2: Team Lead Synthesis + Plan Document"
    description: "You (the main agent acting as Team Lead) synthesize all 3 reports into an ordered TDD task list. Each task includes exact RED (failing test) and GREEN (minimal implementation) code, a shell verification command with expected output, a commit message, complexity rating, and dependency links. The plan is written to docs/specs/YYYY-MM-DD-<topic>-plan.md."
  - step: "Phase 3: Plan Review + User Approval"
    description: "A Plan Reviewer agent verifies the plan against the spec (up to 3 iterations). After automated approval, you review the task count, complexity breakdown, open issues, and assumptions before the plan is locked."

output:
  artifact: "docs/specs/YYYY-MM-DD-<topic>-plan.md"
  format: "A structured Markdown plan with architecture summary, technical decisions, quality strategy, and an ordered TDD task list. Each task contains exact test code, implementation code, a verification shell command, a commit message, complexity rating, and dependency declarations."
  sections:
    - "Architecture Summary (condensed from Architect)"
    - "Technical Decisions (condensed from Tech Lead)"
    - "Quality Strategy (condensed from QA Engineer)"
    - "Task Breakdown (Task 1..N with RED/GREEN/Verify/Commit steps)"

examples:
  - title: "Task entry in the generated plan"
    type: output_sample
    sample:
      language: markdown
      code: |
        ### Task 3: Add order status change event emission
        **Files:** src/services/order.service.ts, src/services/order.service.spec.ts
        **Complexity:** standard
        **Dependencies:** Task 1, Task 2
        **Execution routing:** default implementation tier

        - [ ] RED: Write failing test
          ```typescript
          it('emits ORDER_STATUS_CHANGED when order transitions to shipped', async () => {
            const eventSpy = jest.spyOn(eventEmitter, 'emit');
            await orderService.markShipped(orderId);
            expect(eventSpy).toHaveBeenCalledWith('ORDER_STATUS_CHANGED', { orderId, status: 'shipped' });
          });
          ```
        - [ ] GREEN: Implement minimum code to pass
          ```typescript
          async markShipped(orderId: string): Promise<Order> {
            const order = await this.db.order.update({ where: { id: orderId }, data: { status: 'shipped' } });
            this.eventEmitter.emit('ORDER_STATUS_CHANGED', { orderId, status: 'shipped' });
            return order;
          }
          ```
        - [ ] Verify: `npx vitest run src/services/order.service.spec.ts`
          Expected: 3 passed, 0 failed
        - [ ] Commit: `feat(order): emit ORDER_STATUS_CHANGED event on shipped transition`
    explanation: "Every task contains copy-pasteable code for both the failing test and the minimum implementation, with an exact verification command and expected output — no ambiguity for the implementer."

  - title: "Invoking plan against a specific spec"
    type: invocation
    command: "zuvo:plan docs/specs/2026-03-28-order-notifications-spec.md"
    result: |
      STEP: Phase 1.1 — Architect Analysis [START]
      Dispatching Architect agent (Sonnet, Explore, token budget 5000)...
      STEP: Phase 1.1 — Architect Analysis [DONE]
      STEP: Phase 1.2 — Tech Lead Analysis [START]
      ...
      Plan written to: docs/specs/2026-03-29-order-notifications-plan.md
      Tasks: 8 (5 standard, 3 complex) | Reviewer: APPROVED (iteration 1)

when_to_use: |
  Use zuvo:plan when an approved spec exists at docs/specs/*-spec.md and implementation has not yet started. It is the second stage of the brainstorm → plan → execute pipeline. The prerequisite is a spec with Status: Approved produced by zuvo:brainstorm. The output plan is the prerequisite for zuvo:execute.

when_not_to_use: |
  If no spec exists, zuvo:plan will redirect you to zuvo:brainstorm automatically — there is nothing to plan against. For small 1-5 file features that do not need a formal spec, use zuvo:build instead, which handles planning inline as part of the feature development workflow. Do not invoke zuvo:plan to revise already-running implementations; use zuvo:execute's per-task flow instead.

