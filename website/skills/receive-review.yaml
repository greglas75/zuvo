    relation: "counterpart — use when you are the reviewer generating findings"
  - slug: fix-tests
    relation: "batch repair test patterns surfaced by the review"
  - slug: write-tests
    relation: "write tests for new branches introduced by review fixes"

faq:
  - q: "What does zuvo:receive-review do that a 'just apply these comments' instruction doesn't?"
    a: "The VERIFY step reads the actual code at the referenced line before accepting the reviewer's premise. Reviewers sometimes reference stale diffs, misread control flow, or suggest changes that break callers. The skill catches these cases and pushes back with evidence rather than silently applying a fix that introduces a regression."
  - q: "How does zuvo:receive-review handle pushback?"
    a: "The EVALUATE step makes a binary judgment for each item. Push back when the suggestion breaks existing functionality (traced to callers), violates YAGNI, is technically incorrect for this language or framework version, or conflicts with an architecture decision already made. Every pushback includes a specific technical reason — 'Pushing back: [reason with evidence]', not 'I disagree'."
  - q: "How does trust level change the behavior?"
    a: "User feedback (high trust) is implemented after understanding without second-guessing. External reviewer feedback (standard trust) triggers extra verification of factual claims against the code. Automated tool findings (skeptical trust) are verified against the code and tested — automated tools flag patterns, not bugs, and may be intentional."
  - q: "Why are fixes applied one at a time instead of batched?"
    a: "Sequential fixes prevent cascading errors where fix #3 breaks what fix #1 corrected. Each fix is followed by a test run before moving to the next item. If a fix introduces a new branch or error path, a test is written before proceeding. Batching obscures which fix caused which failure."
  - q: "What happens after all items are processed?"
    a: "The skill produces a completion summary: total items processed, fixed items with file:line and description of change, pushed-back items with technical reason, final test results, and any new tests added. If a fix introduced test gaps, those are listed separately."

