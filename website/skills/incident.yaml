faq:
  - q: "What does zuvo:incident do?"
    a: "It runs a structured 6-phase post-mortem: (0) gather evidence from git history, deployment markers, error traces, and config changes, (1) build a chronological timeline, (2) perform 5-Whys root cause analysis with evidence at every level, (3) assess impact across duration, users, data, financial, and severity dimensions, (4) generate a full incident report, (5) create prevention action items and persist them to the backlog."
  - q: "How does the 5-Whys analysis work?"
    a: "Starting from the user-visible symptom, each 'why' must be supported by actual evidence — file references, commit hashes, error messages, or config changes. The analysis stops before 5 if going deeper would be speculative. Findings are classified into root cause (the actual bug), contributing factors (process gaps that allowed it to ship), and detection gaps (why monitoring did not catch it sooner)."
  - q: "What severity levels does zuvo:incident support?"
    a: "Three levels: SEV1 (full outage, data loss, or security breach affecting all users), SEV2 (degraded service or partial outage affecting a subset), SEV3 (minor issue with limited impact, caught early). Severity can be provided via --severity or auto-classified from evidence during Phase 3."
  - q: "Do I need to provide the --since flag?"
    a: "No. If omitted, the investigation window defaults to 24 hours before the current time. Providing --since (as a date, commit hash, or relative like '3d' or '48h') narrows the window and produces a more focused analysis. Mentioning recent deployments or feature flag changes in the description also helps."
  - q: "Where is the incident report saved?"
    a: "By default to docs/incidents/YYYY-MM-DD-slug.md, where the slug is derived from the incident description. Use --output to specify a custom path. Action items are also persisted to memory/backlog.md."

arguments:
  - flag: "<description or error>"
    description: "Incident description, error message, stack trace, or issue tracker ID (e.g., Sentry issue). Determines the investigation focus."
  - flag: "--since [date/commit]"
    description: "Start of investigation window. Accepts a date, commit hash, or relative time ('3d', '48h'). Default: 24 hours before current time."
  - flag: "--severity [SEV1/SEV2/SEV3]"
    description: "Incident severity level. If not provided, auto-classified from evidence during Phase 3 impact assessment."
  - flag: "--output [path]"
    description: "Save report to specific path. Default: docs/incidents/YYYY-MM-DD-slug.md."

