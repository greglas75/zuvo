faq:
  - q: "What does zuvo:write-tests check that a code generator doesn't?"
    a: "After generating tests, the skill runs Q1-Q17 gates on every written file. Critical gates Q7 (error paths), Q11 (branches covered), Q13 (imports real production code), Q15 (content assertions), and Q17 (computed output vs. input echo) must all pass before the skill completes. A generator that produces code without evaluating it will silently ship tests that always pass regardless of production behavior."
  - q: "How is zuvo:write-tests different from zuvo:write-e2e?"
    a: "zuvo:write-tests produces unit and integration tests for individual functions, services, controllers, and hooks — it exercises logic in isolation with mocks. zuvo:write-e2e produces Playwright browser tests that drive a real UI through full user flows. Use write-tests for unit/integration coverage and write-e2e for end-to-end browser coverage."
  - q: "How long does zuvo:write-tests take?"
    a: "A single file typically takes 1-3 minutes including analysis, writing, and Q1-Q17 evaluation. Auto mode processes 15 files per batch; a project with 60 uncovered files takes 4 batches. The skill loops automatically in Claude Code — you start it and return when coverage.md shows zero gaps."
  - q: "Can zuvo:write-tests write integration tests with a real database?"
    a: "Yes. When Phase 1.5b classifies a file as NEEDS_INTEGRATION (static ORM calls, framework singletons), the skill looks up the project's existing DB test pattern (transaction rollback, fixture helpers) and uses it. It never writes markTestSkipped stubs for code that requires a database — it either writes real integration tests or adds a backlog item."
  - q: "What frameworks does zuvo:write-tests support?"
    a: "The skill supports TypeScript and JavaScript projects with Vitest or Jest, including NestJS controllers, React/Next.js hooks and components, Redux slices, and ORM repositories (Prisma, TypeORM, ActiveRecord). It also handles Python (pytest) and PHP/Yii2 (Codeception) when the stack is detected."

arguments:
  - flag: "[file.ts]"
    description: "Write tests for one specific production file"
  - flag: "[directory/]"
    description: "Write tests for all production files under a directory"
  - flag: "auto"
    description: "Discover all UNCOVERED/PARTIAL files and loop in batches of 15 until zero gaps remain"
  - flag: "--dry-run"
    description: "Run analysis and produce the plan without writing any test files"

checks: null

frameworks:
  - TypeScript
