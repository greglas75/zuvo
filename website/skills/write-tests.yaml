problem: |
  Untested production files accumulate silently. When you finally add tests, generic patterns produce type-check stubs, skipped placeholders, and assertions that only verify a value exists — not what it equals. `zuvo:write-tests` reads the actual production code first, classifies each file into one of 11 code types, selects the correct test patterns for that type, enforces a minimum test count, and runs Q1-Q17 gates before calling it done. The result is tests that actually exercise production behavior, not ones that inflate coverage metrics.

how_it_works:
  - step: "Context gathering and baseline"
    description: "Reads project conventions, detects the test runner and stack, discovers existing test patterns (integration fixtures, reflection mocking, DI overrides), and runs the current test suite to capture pre-existing failures."
  - step: "Coverage scan and code-type classification"
    description: "The Coverage Scanner inventories production files and classifies each as UNCOVERED, PARTIAL, or COVERED. The Pattern Selector reads each target file and assigns a code type from the 11-type system, then determines testability (UNIT_MOCKABLE, UNIT_REFLECTION, NEEDS_INTEGRATION, MIXED)."
  - step: "Plan with approval gate"
    description: "Produces a per-file plan including code type, testability decision, minimum test count with math, patterns to follow (G-* IDs), patterns to avoid (P-* IDs), describe block outline, and mock hazards. In explicit mode, waits for approval before writing."
  - step: "Test writing with pre-write blocklist"
    description: "Writes tests following the plan. Blocks stub patterns before writing: assertIsBool-only assertions, markTestSkipped placeholders, assertTrue(true) vacuous passes, and tests that target a different class than the file name."
  - step: "Q1-Q17 self-evaluation and verification"
    description: "Runs the full test suite against written tests. Evaluates every written file against Q1-Q17 gates, prints the scorecard with critical gate status, and fixes any critical-gate failures before completion."

output:
  artifact: "memory/coverage.md"
  format: "Test files written alongside production code; coverage tracking updated in memory/coverage.md; backlog items for issues discovered but not fixed."
  sections:
    - "WRITE-TESTS COMPLETE summary (files tested, tests written, Q-gate avg)"
    - "Per-file coverage status (UNCOVERED/PARTIAL/COVERED)"
    - "Q1-Q17 scorecards per written file"
    - "Backlog items for production code concerns"

examples:
  - title: "Uncovered service → tested with behavior assertions"
    type: before_after
    gate: "Q17"
    before:
      language: typescript
      code: |
        // order.service.ts (untested — 0 coverage)
        async createOrder(userId: string, items: Item[]): Promise<Order> {
          if (!userId?.trim()) throw new Error("userId required");
          const reserved = await this.inventory.reserve(items);
          return this.db.orders.create({ userId, items: reserved });
        }
    after:
      language: typescript
      code: |
        // order.service.test.ts (generated by zuvo:write-tests)
        describe("OrderService.createOrder", () => {
          it("creates order with reserved items", async () => {
            mockInventory.reserve.mockResolvedValue(reservedItems);
            mockDb.orders.create.mockResolvedValue(createdOrder);
            const result = await service.createOrder("usr_1", items);
            expect(result.id).toBe("ord_abc");
            expect(mockInventory.reserve).toHaveBeenCalledWith(items);
          });
          it("throws when userId is empty", async () => {
            await expect(service.createOrder("  ", items))
              .rejects.toThrow("userId required");
          });
          it("throws when userId is missing", async () => {
            await expect(service.createOrder(undefined as any, items))
              .rejects.toThrow("userId required");
          });
        });
    explanation: "SERVICE type requires methods × 3 minimum tests. The generated tests assert computed output (result.id), verify mock arguments (toHaveBeenCalledWith), and cover both empty and undefined userId branches — satisfying Q7 (error paths) and Q17 (computed output assertions)."
  - title: "Auto-discover and batch-write uncovered files"
    type: invocation
    command: "zuvo:write-tests auto"
    result: "Discovers all UNCOVERED and PARTIAL files, processes them in batches of 15 ordered by risk tier (SERVICE/CONTROLLER first), writes tests, runs Q1-Q17 per file, and loops until coverage.md shows zero gaps."

when_to_use: "Use `zuvo:write-tests` when production files lack test coverage — either after completing a feature without tests, after inheriting a legacy codebase, or after a refactor that invalidated the old test files. Use `auto` mode to clear an entire backlog of untested files in one session."

when_not_to_use: "For new feature development, use `zuvo:build` — it writes tests alongside new code from the start. For repairing the same broken assertion pattern across many existing test files, use `zuvo:fix-tests`. For auditing whether existing tests are high quality without writing new ones, use `zuvo:test-audit`."

