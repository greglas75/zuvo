  - React (TSX/JSX)
  - Next.js
  - NestJS
  - Vitest
  - Jest
  - Python (pytest)
  - PHP / Yii2 (Codeception)
  - Redux Toolkit
  - Prisma / TypeORM

modes:
  - name: "[path]"
    description: "Explicit target mode — one file or directory. Shows plan and waits for approval before writing."
  - name: "auto"
    description: "Discovery mode — finds all UNCOVERED and PARTIAL files, processes in risk-ranked batches of 15, loops until done."
  - name: "--dry-run"
    description: "Preview mode — produces the full analysis plan but writes no files."

agents:
  - name: "Coverage Scanner"
    role: "Inventories production files, identifies untested exports, classifies coverage status (UNCOVERED/PARTIAL/COVERED), and ranks by risk."
  - name: "Pattern Selector"
    role: "Reads each target file, classifies its code type from the 11-type system, determines testability strategy, and selects the correct G-*/P-* patterns."
  - name: "Test Quality Auditor"
    role: "Independently runs Q1-Q17 on written test files and produces an evidence-backed score for comparison with the self-evaluation."

