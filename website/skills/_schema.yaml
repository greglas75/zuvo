# Zuvo Skill SEO Page Schema — v1
# Reference document for YAML data files in this directory.
# Each *.yaml file (except this one) represents one skill's landing page data.
#
# Integration contract:
# - Valid YAML 1.2
# - Field names must NOT conflict with Astro reserved keys: id, collection, render, slug, body, data
# - meta.slug is the unique identifier and URL path segment
# - Website renders pages at /en/skills/{meta.slug}

# ─── REQUIRED FIELDS ───────────────────────────────────────────────────────────

schema_version: 1                    # always 1 for this schema version

last_synced: "YYYY-MM-DD"           # date the agent last regenerated this file from SKILL.md

meta:
  slug: string                       # kebab-case skill identifier (e.g., "code-audit")
  title: string                      # H1 + <title>. Format: "{Skill Name} — {outcome phrase}"
                                     # Must be unique across all skill files
  description: string                # <meta description>. Max 155 characters.
                                     # Must include at least one quantitative claim (number).
                                     # Must be unique across all skill files.
  category: enum                     # One of: audit | task | pipeline | utility | design | release
  og_image: string                   # Path: /og/skills/{slug}.png (generated by website template)

seo:
  target_queries: []                 # 3-5 long-tail search queries this page targets
                                     # Internal planning only — not rendered on the page
  canonical: string                  # /en/skills/{slug}

stats: []                            # 3-6 hero stat cards displayed in the page header
  # - label: string                  # e.g., "Quality Gates"
  #   value: string                  # e.g., "22" — use "N+" for approximate counts
  #   detail: string                 # optional clarification, e.g., "CQ1-CQ22"

problem: string                      # 2-4 sentence problem statement (markdown)
                                     # Answers: why does this skill exist?

how_it_works: []                     # 3-5 numbered steps
  # - step: string                   # phase/step name
  #   description: string            # 1-2 sentences describing the step

output:
  artifact: string                   # file path pattern (e.g., "audit-results/code-audit-YYYY-MM-DD.md")
  format: string                     # 1 sentence: what the output looks like
  sections: []                       # key sections in the output report

examples: []                         # 1-3 examples showing the skill in action
  # - title: string
  #   type: enum                     # before_after | output_sample | invocation
  #   # For before_after:
  #   before: { language: string, code: string }
  #   after: { language: string, code: string }
  #   gate: string                   # optional — which check ID this demonstrates
  #   explanation: string
  #   # For output_sample:
  #   sample: { language: string, code: string }
  #   explanation: string
  #   # For invocation:
  #   command: string
  #   result: string

when_to_use: string                  # 1-3 sentences: when to reach for this skill

when_not_to_use: string              # 1-3 sentences with explicit cross-links to sibling skills
                                     # Must name confusable siblings (e.g., "For per-PR review → zuvo:review")

related_skills: []                   # 2-5 related skills
  # - slug: string                   # must be from the 39-slug allow-list
  #   relation: string               # 1 phrase explaining the relationship

faq: []                              # 3-5 Q&A pairs targeting distinct search intents
  # - q: string                      # question (include skill name for SEO)
  #   a: string                      # answer, 2-4 sentences
  # CONSTRAINT: each Q must target a distinct intent from this list:
  #   "What does X check/do?" (informational)
  #   "How is X different from Y?" (comparison)
  #   "How long does X take?" (practical)
  #   "Can X auto-fix?" (capability)
  #   "What frameworks/languages?" (compatibility)

arguments: []                        # all CLI flags/arguments
  # - flag: string
  #   description: string

# ─── CONDITIONAL FIELDS (null when not applicable) ─────────────────────────────

checks: null                         # object for audit/design-review skills, null otherwise
  # sections: []
  #   - name: string                 # e.g., "Quality Gates"
  #     id_range: string             # e.g., "CQ1-CQ22"
  #     count: number
  #     items: []                    # representative 5-8 items (not exhaustive)
  #       - id: string
  #         name: string
  #         critical: boolean

frameworks: []                       # supported frameworks/languages. Empty if framework-agnostic.

modes: null                          # array for skills with modes/flags, null otherwise
  # - name: string
  #   description: string

agents: null                         # array for skills with sub-agents, null otherwise
  # - name: string                   # e.g., "Code Explorer"
  #   role: string                   # 1 sentence: what this agent does

benchmarks: []                       # 1-4 verifiable quantitative claims
  # - claim: string                  # exact statement with numbers
  #   type: enum                     # coverage | speed | accuracy | savings
  #   verifiable: boolean            # can the reader verify from public SKILL.md?
  #   source: string                 # where the number comes from

comparison_table: null               # object for skills with meaningful comparisons, null otherwise
  # columns: []                      # e.g., ["Capability", "Manual", "ESLint", "zuvo:code-audit"]
  # rows: []                         # array of string arrays
  # CONSTRAINT: cells must contain verifiable structural differences only.
  # No subjective claims ("better", "limited", "poor").

# ─── SLUG ALLOW-LIST (39 skills) ──────────────────────────────────────────────
# related_skills[].slug MUST reference only these values:
#
# api-audit, architecture, backlog, brainstorm, build, canary, ci-audit,
# code-audit, db-audit, debug, deploy, dependency-audit, design, design-review,
# docs, env-audit, execute, fix-tests, pentest, performance-audit, plan,
# presentation, receive-review, refactor, release-docs, retro, review,
# security-audit, seo-audit, seo-fix, ship, structure-audit, test-audit,
# tests-performance, ui-design-team, using-zuvo, worktree, write-e2e, write-tests
