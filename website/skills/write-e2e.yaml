faq:
  - q: "What does zuvo:write-e2e generate that a Playwright codegen recording doesn't?"
    a: "Playwright codegen produces a linear recording of one happy-path interaction with fragile CSS selectors and no auth. zuvo:write-e2e generates error paths, validation failures, server error cases, auth via storageState fixtures, and stable role/label locators — all from codebase analysis rather than manual clicking."
  - q: "How is zuvo:write-e2e different from zuvo:write-tests?"
    a: "zuvo:write-tests produces unit and integration tests that exercise code in isolation with mocks. zuvo:write-e2e produces Playwright browser tests that drive the full application UI through user journeys. Unit tests are fast and precise; E2E tests are slower but verify that all layers work together end-to-end."
  - q: "What auth strategies does zuvo:write-e2e support?"
    a: "The skill auto-detects Clerk (@clerk/nextjs), NextAuth (next-auth), Supabase (@supabase/auth-helpers), and Passport.js / custom /api/auth/* handlers. For each, it generates the appropriate storageState fixture so tests share session state instead of logging in per test."
  - q: "How long does spec generation take?"
    a: "Discovery and scoring (Phase 0-1) takes 1-2 minutes. Generating specs for 5 flows takes roughly 3-5 minutes. Live validation adds 1-2 minutes per flow depending on app startup time. Use --flows first to preview the ranked list before committing to full generation."
  - q: "Will zuvo:write-e2e modify my existing playwright.config.ts?"
    a: "No. The skill proposes a config diff but requires explicit confirmation before modifying playwright.config.ts. It never overwrites existing test files. New .spec.ts files are written with a human-review header and the skill recommends manual verification before committing."

arguments:
  - flag: "[path]"
    description: "Scope generation to a specific page, route directory, or component"
  - flag: "--live"
    description: "Enable browser-assisted mode: validates locators and executes specs against a running app"
  - flag: "--live [url]"
    description: "Navigate to a specific URL, snapshot DOM, and generate tests for that page only"
  - flag: "--auto"
    description: "Skip user flow selection, take top N flows by score"
  - flag: "--flows"
    description: "Run Phase 0-1 only — show scored flow list without generating specs"
  - flag: "--max-flows N"
    description: "Cap generation at N flows (default: 20)"
  - flag: "--dry-run"
    description: "Show what would be generated without writing any files"

checks:
  sections:
    - name: "E2E Quality Gates"
      id_range: "E2E-Q1 through E2E-Q10"
      count: 10
      items:
        - id: "E2E-Q1"
          name: "No hardcoded waits (waitForTimeout)"
          critical: true
        - id: "E2E-Q2"
          name: "Stable locators — no nth(), no CSS path selectors"
          critical: true
        - id: "E2E-Q3"
          name: "Test independence — no shared mutable state across tests"
          critical: true
        - id: "E2E-Q5"
          name: "Auth via storageState fixture, not per-test login"
          critical: true
        - id: "E2E-Q4"
          name: "User-visible assertions (not internal state)"
          critical: false
        - id: "E2E-Q6"
          name: "External API calls mocked via route.fulfill"
          critical: false
        - id: "E2E-Q7"
          name: "Error paths tested (validation, unauthorized, server error)"
          critical: false
        - id: "E2E-Q10"
          name: "Cleanup after destructive tests (afterEach teardown)"
          critical: false

frameworks:
  - Playwright
  - Next.js (App Router + Pages Router)
  - React / Vite
  - NestJS (API-only request context)
  - Nuxt
  - Angular
  - Clerk
  - NextAuth
  - Supabase Auth
  - Passport.js

modes:
  - name: "FULL"
    description: "Discover flows, present scored list, user selects, generate specs."
  - name: "SCOPED"
    description: "Generate E2E tests for a specific page or route path."
  - name: "LIVE"
    description: "Browser-assisted: validates locators against a running app and executes specs."
  - name: "AUTO"
    description: "Non-interactive: skip user selection, take top N flows by score."
  - name: "DISCOVER"
    description: "Phase 0-1 only — output scored flow list and stop."

agents:
  - name: "Route Discoverer"
    role: "Scans routes, interactive components, API endpoints, and auth patterns to build the candidate flow inventory."
  - name: "Coverage Analyzer"
    role: "Inventories existing E2E spec files and maps which flows are already covered."
  - name: "Flow Planner"
    role: "Scores and ranks candidate flows using the 5-signal weighted formula, then produces the flow selection list."
  - name: "Test Writer"
    role: "Generates .spec.ts files per flow batch — up to 3 writers run in parallel for independent flows."

