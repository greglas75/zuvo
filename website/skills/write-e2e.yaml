problem: |
  Writing Playwright tests by hand is slow and brittle. Tests use nth() selectors, hard-code setTimeout waits, and skip auth because setting up storageState is tedious. The result is a flaky suite that only covers the happy path on the login page. `zuvo:write-e2e` scans the codebase for routes, forms, mutations, and auth patterns, scores every user flow by criticality, and generates specs with stable locators, auth fixtures, error path coverage, and quality gates built in.

how_it_works:
  - step: "Tool and stack detection"
    description: "Checks CodeSift and Playwright MCP availability. Detects the web framework (Next.js App Router, Vite/React, NestJS, Nuxt, Angular) and auth provider (Clerk, NextAuth, Supabase, Passport, custom) to select the correct locator and auth fixture strategies."
  - step: "Parallel discovery"
    description: "Route Discoverer scans all navigable paths, interactive components (forms, modals), API endpoints (POST/PUT/DELETE), and auth patterns. Coverage Analyzer inventories existing E2E files to map already-covered flows. Both agents run in parallel."
  - step: "Flow scoring and selection"
    description: "The Flow Planner scores each candidate flow on 5 weighted signals: mutation type (30), auth requirement (20), data sensitivity (20), user traffic proxy (15), and existing coverage gap (15). Flows scoring 70+ are CRITICAL and generated first."
  - step: "Scaffold and spec generation"
    description: "Writes auth fixtures using storageState, generates Page Object Models only when 3+ interactions are reused, and produces .spec.ts files with happy path, error paths, and edge cases per flow. Generated files carry a human-review header."
  - step: "Quality gate check and live validation"
    description: "Each generated spec is checked against E2E-Q1 through E2E-Q10. Critical gate failures (hardcoded waits, unstable locators, shared state, per-test login) are auto-fixed. With --live flag, specs are executed against the running app and failures are categorized."

output:
  artifact: "memory/e2e-coverage.md"
  format: "Playwright .spec.ts files under e2e/flows/, auth fixtures under e2e/fixtures/, optional Page Object Models under e2e/pages/. Coverage registry persisted to memory/e2e-coverage.md."
  sections:
    - "WRITE-E2E COMPLETE summary (flows generated, files created, gates passed)"
    - "Scored flow list with confidence levels"
    - "Quality gate results per spec (E2E-Q1 through E2E-Q10)"
    - "TestID suggestions for interactive elements without data-testid"
    - "Validation results (--live only)"

examples:
  - title: "Generated Playwright spec for a create-project flow"
    type: output_sample
    sample:
      language: typescript
      code: |
        // Generated by zuvo:write-e2e -- 2026-03-29
        // Flow: projects/create | Score: 88 | Confidence: HIGH
        // Human review recommended before committing

        import { test, expect } from "@playwright/test";

        test.use({ storageState: "e2e/fixtures/.auth/user.json" });

        test.describe("Create Project", () => {
          test("creates a project and redirects to dashboard", async ({ page }) => {
            await page.goto("/projects/new");
            await page.getByLabel("Project name").fill("Acme Q2");
            await page.getByRole("button", { name: "Create project" }).click();
            await page.waitForURL("/projects/*");
            await expect(page.getByRole("heading", { name: "Acme Q2" })).toBeVisible();
          });

          test("shows validation error when name is empty", async ({ page }) => {
            await page.goto("/projects/new");
            await page.getByRole("button", { name: "Create project" }).click();
            await expect(page.getByRole("alert")).toContainText("Project name is required");
          });

          test("shows server error on API failure", async ({ page }) => {
            await page.route("/api/projects", (r) => r.fulfill({ status: 500 }));
            await page.goto("/projects/new");
            await page.getByLabel("Project name").fill("Test");
            await page.getByRole("button", { name: "Create project" }).click();
            await expect(page.getByRole("alert")).toContainText("Something went wrong");
          });
        });
    explanation: "Score 88 flow with HIGH confidence. Stable locators (getByLabel, getByRole) satisfy E2E-Q2. Auth via storageState (not per-test login) satisfies E2E-Q5. Three test cases cover happy path, validation error, and server error — satisfying E2E-Q7 (error paths tested)."
  - title: "Discover flows without generating specs"
    type: invocation
    command: "zuvo:write-e2e --flows"
    result: "Runs Phase 0-1 only. Outputs the scored and ranked flow list with confidence levels, then stops. Useful for reviewing what would be generated before committing to spec creation."

when_to_use: "Use `zuvo:write-e2e` when a web application has no E2E coverage, after adding major new routes or user flows, or when manual test writing is falling behind. Use `--live` when the application is running locally and you want locator validation and test execution in one step."

when_not_to_use: "For unit and integration tests on individual functions, services, or components, use `zuvo:write-tests` — E2E tests are slower, harder to maintain, and test at the wrong granularity for logic-level coverage. For fixing flaky or broken E2E tests, use `zuvo:fix-tests`. For auditing existing E2E test quality, use `zuvo:test-audit --include-e2e`."

