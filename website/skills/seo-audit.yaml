  title: "SEO Audit — 13-Dimension Code + GEO Readiness Analysis"
  description: "SEO/GEO audit: 13 dimensions, 6 critical gates, 66 checks, bot matrix, source-vs-render diff, JSON-LD SSR. Astro, Next.js, Hugo."
