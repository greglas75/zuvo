  - name: "--quick"
    description: "Critical gates CG1-CG6 only — pass/fail in under 2 minutes"
  - name: "--content-only"
    description: "Content quality, GEO, and answer-first dimensions"
  - name: "--geo"
    description: "Structured data, AI crawlers, and GEO readiness dimensions"
  - name: "--live-url"
    description: "Code audit plus live CWV measurement and broken link detection"

agents:
