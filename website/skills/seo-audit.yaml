    role: "Evaluates D1 (meta tags), D4 (sitemaps), D5 (robots/crawlers), D11 (technical SEO), D12 (hreflang), D13 (page experience)"
  - name: "SEO Content Agent"
    role: "Evaluates D7 (content quality), D9 (GEO readiness), D10 (answer-first content)"
  - name: "SEO Assets Agent"
    role: "Evaluates D2 (Open Graph/social), D3 (structured data/JSON-LD), D6 (image optimization), D8 (Core Web Vitals)"

benchmarks:
