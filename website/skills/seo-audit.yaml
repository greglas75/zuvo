stats:
  - label: "Dimensions"
    value: "13"
    detail: "D1-D13: meta, schema, crawlability, content, monitoring"
  - label: "Critical Gates"
    value: "6"
    detail: "CG1-CG6: sitemap, Googlebot, HTTPS, canonical, JSON-LD SSR, AI crawlers"
  - label: "Checks"
    value: "66"
    detail: "66 canonical checks across 13 dimensions"
  - label: "Bot Profiles"
    value: "15"
    detail: "Training, search, retrieval, and user-proxy bots"
  - label: "Sub-scores"
    value: "3"
