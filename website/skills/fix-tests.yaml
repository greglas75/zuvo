    type: coverage
    verifiable: true
    source: "SKILL.md Supported Patterns table"
  - claim: "Files are processed in batches of 5 to prevent cascading errors where fix N breaks what fix N-1 corrected."
    type: accuracy
    verifiable: true
    source: "SKILL.md Step 4: Batch Fix"
  - claim: "Every rewritten assertion must reference real fields, real types, and real behaviors from the production code — not generic placeholders."
    type: accuracy
    verifiable: true
    source: "SKILL.md Fix Principles: 'Use production-derived values'"
  - claim: "Orphan test files (no matching production source) are skipped for 16 patterns that require production context, and processed for 5 mechanical patterns that do not."
    type: accuracy
    verifiable: true
    source: "SKILL.md Step 2: Identify Affected Files"

