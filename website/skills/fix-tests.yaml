    - ["Batch repair across entire suite", "Manual, inconsistent", "None", "Batches of 5, one pattern at a time"]
    - ["Production bug discovery", "Incidental", "None", "Flagged when stronger assertion fails"]
    - ["Pattern coverage", "Reviewer-dependent", "Style rules only", "21 semantic test anti-patterns"]
