faq:
  - q: "What does zuvo:execute do for each task?"
    a: "Each task goes through a 9-step cycle: mark in-progress, dispatch implementer, handle implementer status (DONE / BLOCKED / NEEDS_CONTEXT), dispatch Spec Reviewer, handle compliance verdict, dispatch Quality Reviewer, handle quality verdict, mark completed with scores, update the CodeSift index. Both reviewers operate independently — the Spec Reviewer reads actual code, not the implementer's report."
  - q: "How is zuvo:execute different from zuvo:build?"
    a: "zuvo:execute is a pipeline orchestrator — it processes tasks from an existing plan document produced by zuvo:plan. It does not write code itself; it dispatches implementer agents. zuvo:build is a standalone feature development skill for 1-5 file changes that handles planning, implementation, and quality review in a single workflow without requiring a pre-existing plan document."
  - q: "What happens when a quality review fails?"
    a: "The implementer is re-dispatched with the reviewer's findings (file:line references for each failing gate). This loop repeats up to 3 times. After 3 iterations with unresolved failures, both positions are presented to you — the failing gates, what the implementer has done, and whether the issues are fixable or represent a design disagreement. You decide: accept as-is (with backlog entry), require a fix, or provide guidance."
  - q: "What quality gates does zuvo:execute enforce?"
    a: "The Quality Reviewer runs CQ1-CQ22 on production code and Q1-Q17 on test code. Critical gates are CQ3, CQ4, CQ5, CQ6, CQ8, CQ14 (production) and Q7, Q11, Q13, Q15, Q17 (tests). Any critical gate failure blocks the task from completing — not just from committing — until either fixed or explicitly accepted by you with a backlog entry."
  - q: "What frameworks and languages does zuvo:execute support?"
    a: "zuvo:execute detects the project stack from config files and passes the correct rules file (TypeScript, React/Next.js, NestJS, Python) to each implementer agent. The implementer agents produce stack-appropriate code, tests, and verification commands. All 39 quality gates (CQ1-CQ22 + Q1-Q17) apply regardless of stack."

