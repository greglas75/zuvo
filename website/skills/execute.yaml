problem: |
  Having an approved plan is not enough — implementation without automated checkpoints produces code that drifts from the spec, skips quality standards under time pressure, and accumulates silent technical debt. zuvo:execute is the orchestration layer that prevents this: it processes each plan task through a mandatory 9-step cycle including TDD implementation, independent spec compliance review, and independent code quality review. No task reaches a commit without passing both gates. Findings that cannot be fixed immediately are persisted to the backlog rather than silently dropped.

how_it_works:
  - step: "Hard Gate: Plan Required"
    description: "zuvo:execute searches for docs/specs/*-plan.md. If none exists, it redirects to zuvo:plan. The plan is parsed to extract the full task list with files, complexity ratings, TDD steps, and dependency order."
  - step: "Artifact Detection"
    description: "The skill reads both the spec and plan documents, and checks memory/backlog.md for existing tech debt relevant to the files being touched. Reviewers use the spec to verify compliance."
  - step: "Task Execution Loop (9 steps per task)"
    description: "For each task in dependency order: (1) mark in-progress, (2) dispatch implementer (Sonnet for standard tasks, Opus for complex), (3) handle DONE / DONE_WITH_CONCERNS / NEEDS_CONTEXT / BLOCKED status, (4) dispatch Spec Reviewer, (5) handle COMPLIANT / ISSUES FOUND verdict, (6) dispatch Quality Reviewer, (7) handle PASS / FAIL verdict, (8) mark completed with scores, (9) update CodeSift index."
  - step: "Dual Review Gates"
    description: "The Spec Reviewer reads actual code independently (not the implementer's report) and verifies compliance with the plan. The Quality Reviewer runs CQ1-CQ22 on production files and Q1-Q17 on test files. Both reviewers operate at up to 3 re-dispatch iterations per task before escalating to you."
  - step: "Backlog Persistence and Final Summary"
    description: "Findings accepted as-is, implementer scope concerns, and deferred quality issues are all persisted to memory/backlog.md with fingerprints and deduplication. The final report shows task-by-task CQ and Q scores, all files changed, and backlog items added."

output:
  artifact: "Committed code per task + memory/backlog.md (updated) + execution summary"
  format: "A task-by-task completion report with status, CQ score, Q score, and notes for each task; a full list of files changed across all tasks; and a list of backlog items added during execution."
  sections:
    - "Per-task status (COMPLETED / SKIPPED / BLOCKED)"
    - "CQ score (out of 22) per task"
    - "Q score (out of 17) per task"
    - "Files changed across all tasks"
    - "Backlog items added during execution"

examples:
  - title: "Per-task progress output during execution"
    type: output_sample
    sample:
      language: markdown
      code: |
        --- Task 3/8: Add order status event emission ---
        Status: IN_PROGRESS
        Complexity: standard
        Files: src/services/order.service.ts, src/services/order.service.spec.ts

        [implementer dispatched — Sonnet — status: DONE]
        [spec reviewer dispatched — COMPLIANT (iteration 1)]
        [quality reviewer dispatched — PASS (CQ: 20/22, Q: 16/17)]

        --- Task 3/8: Add order status event emission ---
        Status: COMPLETED
        Files changed: src/services/order.service.ts, src/services/order.service.spec.ts
        Spec review: COMPLIANT (iteration 1)
        Quality review: PASS (CQ: 20/22, Q: 16/17)
    explanation: "Every task produces a structured status block. CQ and Q scores are surfaced per task so quality degradation is visible before it accumulates across the feature."

  - title: "Handling a BLOCKED task"
    type: output_sample
    sample:
      language: markdown
      code: |
        --- Task 5/8: Integrate with email notification service ---
        Status: BLOCKED
        Reason: Implementer cannot determine the correct email service injection pattern —
                EmailService is injected differently in test vs production context.

        Options:
        1. Provide context — share the injection pattern from AGENTS.md or similar
        2. Skip this task — mark SKIPPED, continue with Task 6
        3. Abort pipeline — stop execution, preserve completed tasks 1-4
    explanation: "BLOCKED tasks are never silently skipped. You always receive the reason and 3 explicit options. Completed tasks are preserved regardless of your choice."

when_to_use: |
  Use zuvo:execute when an approved plan document exists at docs/specs/*-plan.md produced by zuvo:plan. It is the final stage of the brainstorm → plan → execute pipeline. The prerequisite is the plan artifact; the output is committed, quality-reviewed code for each task in the plan. You can also invoke zuvo:execute mid-pipeline to resume after a session interruption — it detects which tasks are already completed and continues from where it left off.

when_not_to_use: |
  If no plan exists, zuvo:execute will redirect you to zuvo:plan automatically. For small 1-5 file features that do not need the full pipeline, use zuvo:build instead — it combines planning, implementation, and quality review in a single skill without requiring a separate plan document. For fixing a specific bug rather than implementing a planned feature, use zuvo:debug.

