modes: null

agents:
  - name: Implementer
    role: "Writes production code and tests following the plan's TDD steps. Routed to Sonnet for standard tasks and Opus for complex tasks (4+ files or architecture decisions)."
  - name: Spec Reviewer
    role: "Read-only agent that independently verifies implemented code against the plan and spec. Does not receive the implementer's self-report."
  - name: Quality Reviewer
    role: "Read-only agent that runs CQ1-CQ22 on production files and Q1-Q17 on test files, producing FIX-NOW, CRITICAL-BLOCKED, and DEFER classifications."

