    - ["License compliance", "Partial (advisories)", "No", "D4 — GPL/unknown/conflict detection"]
    - ["Dead dependency detection", "No", "No", "D3 via knip with fallback"]
    - ["Circular dependencies", "No", "Yes", "D6 with false-positive filter"]
    - ["Architecture boundary violations", "No", "Yes (with config)", "D8 with framework-aware layer rules"]
    - ["Change coupling analysis", "No", "No", "D10 via git log (6 months)"]
    - ["Barrel file health", "No", "Partial", "D9 — scope, cycles, tree-shake impact"]
