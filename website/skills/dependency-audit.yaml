    relation: "Overlap — S11 (dependency CVEs) is a subset of D1; security-audit adds OWASP dimensions"
  - slug: refactor
    relation: "Follow-up — fix circular deps (D6), boundary violations (D8), barrel issues (D9)"
  - slug: structure-audit
    relation: "Complement — SA dimensions cover directory structure; D8-D9 cover import-level coupling"
  - slug: performance-audit
    relation: "Overlap — D5 (bundle weight) maps to bundle size and tree-shaking performance dimensions"

faq:
  - q: "What does zuvo:dependency-audit check?"
    a: "It audits 10 dimensions: D1 (supply chain CVEs, install scripts, lockfile integrity), D2 (freshness — major version lag, abandoned packages), D3 (dead/unused deps via knip), D4 (license compliance — GPL in production), D5 (bundle weight — heavy deps with lighter alternatives), D6 (circular dependencies), D7 (instability metrics — fan-in/fan-out via dep-cruiser), D8 (architecture boundary violations), D9 (barrel file health), and D10 (change coupling via 6-month git log analysis)."
  - q: "How does dependency-audit handle missing tools?"
    a: "It degrades gracefully per dimension. dep-cruiser provides the richest D6/D7 analysis; madge is the fallback; grep-based import scanning is always available. knip handles D3 (dead deps) when available; grep cross-referencing is the fallback. D5 uses the Bundlephobia API for triage. Use --no-api to skip external API calls in air-gapped environments."
  - q: "What are the 4 critical gates?"
    a: "D1=0 (known exploit-grade CVE in production), D4=0 (GPL/AGPL in production closed-source app), D6=0 (runtime circular dependency causing initialization bug), and D8=0 (secret leaked to client bundle). Any of these triggers a FAIL grade regardless of the total score."
  - q: "How long does dependency-audit take?"
    a: "A typical medium-size project takes 5-10 minutes with parallel agents. Focused flags like --supply-chain or --dead complete faster. D10 (change coupling) requires 3+ months of git history and may add a minute for large repos."
  - q: "Which package managers does dependency-audit support?"
    a: "npm, pnpm, Yarn (Classic 1.x and Berry 2+), and Bun. Package manager detection is automatic. npm query selectors are npm-specific; pnpm/yarn/bun fall back to lockfile grep analysis. Yarn version detection is critical because Classic and Berry have different command syntax."

arguments:
  - flag: "(empty) or full"
    description: "All 10 dimensions, scope = project root."
  - flag: "[path]"
    description: "Scope to a package or directory. External dims (D1-D5) require a package.json above the path."
  - flag: "--supply-chain"
    description: "D1 only — CVEs, install scripts, lockfile integrity."
  - flag: "--coupling"
    description: "D6, D7, D8, D9 only — circular deps, metrics, architecture, barrels."
  - flag: "--dead"
    description: "D3 only — unused production dependencies."
  - flag: "--bundle"
    description: "D5 only — bundle weight and tree-shaking impact."
  - flag: "--lock-in"
    description: "D7 with vendor lock-in focus — SDK spread across files."
  - flag: "--no-api"
    description: "Skip Bundlephobia and OpenSSF API calls for air-gapped environments."

checks:
  sections:
    - name: "External Dependency Health"
      id_range: "D1-D5"
      count: 5
      items:
        - id: D1
          name: "Supply chain — CVEs, install scripts, git deps, lockfile integrity"
          critical: true
        - id: D2
          name: "Freshness — major version lag, abandoned packages, deprecated deps"
          critical: false
        - id: D3
          name: "Dead dependencies — unused production deps, phantom deps, duplicates"
          critical: false
        - id: D4
          name: "License compliance — GPL/AGPL in production, unknown licenses"
          critical: true
        - id: D5
          name: "Bundle weight — heavy deps with lighter alternatives, tree-shaking support"
          critical: false
    - name: "Internal Coupling"
      id_range: "D6-D10"
      count: 5
      items:
        - id: D6
          name: "Circular dependencies — runtime cycles causing initialization bugs"
          critical: true
        - id: D7
          name: "Coupling metrics — instability score, fan-in/fan-out, vendor lock-in spread"
          critical: false
        - id: D8
          name: "Architecture boundary violations — layer rules, secret in client bundle"
          critical: true
        - id: D9
          name: "Barrel file health — export * scope, circular risk, tree-shake impact"
          critical: false
        - id: D10
          name: "Change coupling — files that always change together (6-month git history)"
          critical: false

frameworks:
  - npm
  - pnpm
  - Yarn Classic (1.x)
  - Yarn Berry (2+)
  - Bun
  - Next.js
  - NestJS
  - Vite
  - Express

modes: null

agents:
  - name: "Supply Chain Scanner"
    role: "Audits D1 (CVEs, install scripts, lockfile) and D4 (license compliance)."
  - name: "Coupling Analyzer"
    role: "Audits D6 (circular deps), D7 (instability metrics), D8 (architecture boundaries), D9 (barrels) using dep-cruiser or madge output."
  - name: "Freshness Checker"
    role: "Audits D2 (freshness), D3 (dead deps via knip), D5 (bundle weight via Bundlephobia)."

benchmarks:
  - claim: "4 critical gates: D1 (CVE), D4 (GPL), D6 (circular dep), D8 (secret in client) — any triggers FAIL"
    type: coverage
    verifiable: true
    source: "SKILL.md — Phase 3, critical gates"
  - claim: "Produces a Delete These Tomorrow list of unused deps removable with zero code changes"
    type: accuracy
    verifiable: true
    source: "SKILL.md — Phase 4 report structure"
  - claim: "D10 change coupling analyzes last 6 months of git history to find co-change clusters"
    type: coverage
    verifiable: true
    source: "SKILL.md — D10 analysis, git log command"
  - claim: "Graceful degradation: dep-cruiser → madge → grep-based import graph for D6-D9"
    type: accuracy
    verifiable: true
    source: "SKILL.md — Phase 0.4 tool availability, 1.2 internal dependency graph"

comparison_table:
