problem: |
  External dependencies accumulate CVEs, abandoned packages, and GPL licenses silently over months.
  Internal dependencies accumulate circular imports, architecture boundary violations, and barrel files that defeat tree-shaking — often introduced by well-intentioned refactoring.
  Most tools check either external dependencies (npm audit) or internal coupling (dep-cruiser), but not both together.
  zuvo:dependency-audit combines both in 10 scored dimensions, applies false-positive filters for known safe patterns, and produces a "Delete These Tomorrow" list of unused deps removable with zero code changes.

how_it_works:
  - step: "Phase 0 — Preflight"
    description: "Locates package.json, detects package manager (npm/pnpm/yarn/bun), detects framework (Next.js, NestJS, Vite, Express) for D8 layer rules, and checks tool availability: PM built-ins, npx knip, npx license-checker, npx depcruise, npx madge."
  - step: "Phase 1 — Data Collection"
    description: "Collects PM audit output (CVEs), PM outdated output (version lag), lockfile analysis (install scripts, git deps, integrity), manifest analysis (specifier types, overrides). Builds internal dependency graph via dep-cruiser, madge, or grep fallback."
  - step: "Phase 2 — Dimension Analysis"
    description: "When parallel dispatch is available, runs 3 agents simultaneously: Supply Chain Scanner (D1, D4), Coupling Analyzer (D6, D7, D8, D9), Freshness Checker (D2, D3, D5). D10 (change coupling via git log) runs in the lead agent."
  - step: "Phase 3 — Verification & Scoring"
    description: "Applies false-positive filters (well-known build tools with install scripts, knip-missed framework plugins, type-only cycles). Scores D1-D10 with N/A handling for dimensions with insufficient data. 4 critical gates: D1, D4, D6, D8."
  - step: "Phase 4 — Report"
    description: "Writes to audits/dependency-audit-[date].md. Includes dimension score table with tool used per dimension, critical gate status, Delete These Tomorrow list, cross-cutting patterns (e.g., barrel causing circular deps), and remediation roadmap."

output:
  artifact: "audits/dependency-audit-YYYY-MM-DD.md"
  format: "Markdown report with dimension scores (tool used per dim), critical gate status, Delete These Tomorrow list, cross-cutting patterns table, all findings by severity, and remediation roadmap."
  sections:
    - "Metadata (PM, scope, dep counts)"
    - "Executive summary with grade"
    - "Dimension scores with tool used"
    - "Critical gate status (D1, D4, D6, D8)"
    - "Delete These Tomorrow"
    - "Findings sorted by severity"
    - "Cross-cutting patterns"
    - "Remediation roadmap"

examples:
  - title: "Full project audit"
    type: invocation
    command: "zuvo:dependency-audit full"
    result: "Audits all 10 dimensions. Detects PM, builds dependency graph, runs 3 parallel agents, applies false-positive filters. Writes report with Delete These Tomorrow list and critical gate status."
  - title: "Supply chain only — CVEs and licenses"
    type: invocation
    command: "zuvo:dependency-audit --supply-chain"
    result: "D1 only: runs npm/pnpm audit, checks install scripts, git dependencies, lockfile integrity. Fast pre-release CVE check."
  - title: "Coupling analysis only"
    type: invocation
    command: "zuvo:dependency-audit --coupling"
    result: "D6-D9: circular dependency detection, instability metrics, architecture boundary violations, barrel file health. Useful after a refactoring to verify coupling was improved."
  - title: "Architecture boundary violation"
    type: before_after
    gate: "D8"
    before:
      language: typescript
      code: |
        // components/OrderCard.tsx
        import { db } from '@/lib/db/prisma';
        const order = await db.order.findUnique({ where: { id } });
    after:
      language: typescript
      code: |
        // components/OrderCard.tsx
        import { getOrder } from '@/lib/services/orders';
        const order = await getOrder(id);
    explanation: "D8 flags UI components importing directly from the data layer — a layer violation. Fix: route through a service layer. In Next.js, server components are the server layer and are exempt."

when_to_use: |
  Run before releases, after adding many dependencies, as a periodic health check, and after monorepo restructuring.
  Also appropriate before lock-in reviews when evaluating vendor SDK dependency spread across the codebase.

when_not_to_use: |
  For code quality patterns (null checks, error handling, atomicity), use zuvo:code-audit or zuvo:review.
  For database-specific issues (queries, indexes, schema), use zuvo:db-audit.
  For full-stack performance (rendering, bundle size, Web Vitals), use zuvo:performance-audit.
  For OWASP security posture beyond CVEs, use zuvo:security-audit.
  This skill is Node.js/TypeScript only — Python, Go, Rust, and Java are not supported.

related_skills:
