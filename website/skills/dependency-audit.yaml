  slug: dependency-audit
  title: "Dependency Audit — 10-Dimension Supply Chain and Internal Coupling Check"
  description: "Dependency audit for Node.js/TypeScript: 10 dimensions — CVEs, dead deps, GPL licenses, circular imports, arch violations, and 6-month change coupling."
  category: audit
  og_image: /og/skills/dependency-audit.png

