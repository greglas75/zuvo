problem: |
  When a developer has 39 skills available, the hardest part is knowing which
  one to reach for. Choosing the wrong skill (using zuvo:build when the scope
  requires brainstorm → plan → execute) skips quality gates and produces
  incomplete work. Doing the task manually when a skill exists skips the
  enforced checklists that skills encode. zuvo:using-zuvo is the always-loaded
  router: it reads developer intent from every message, matches it to the
  routing table, and invokes the right skill automatically — so developers
  get skill-level quality without needing to memorize 39 commands.

how_it_works:
  - step: "Read Every Message"
    description: "The router activates on every user message, not just the first one. Intent is matched against the routing table before any direct action is taken."
  - step: "Match to Priority Tier"
    description: "Intent is matched against 5 tiers in order: Pipeline (brainstorm/plan/execute), Task (build/debug/refactor), Audit (13 audit skills), Utility (backlog/docs/worktree), Release (ship/deploy/canary). Within a tier, the most specific match wins."
  - step: "Pipeline Enforcement"
    description: "If a feature request arrives without a spec, the router redirects to zuvo:brainstorm. If a spec exists but no plan, it redirects to zuvo:plan. The three-phase pipeline cannot be skipped."
  - step: "Boundary Check"
    description: "Simple questions, one-line fixes, git operations, file reads, and conversations are handled directly without invoking a skill. The threshold: if the task requires analysis or produces structured output, use a skill."
  - step: "Invoke via Skill Tool"
    description: "When a match is found, the Skill tool is called with the zuvo: namespace prefix. Explicit skill commands (e.g., '/review', 'run zuvo:security-audit') are passed directly without routing analysis."

output:
  artifact: "(none — routing skill; output is the invoked skill's artifact)"
  format: "Invokes the matched skill and hands off execution. No report file is generated by using-zuvo itself."
  sections:
    - "Skill invocation (transparent to the user)"

examples:
  - title: "Intent routing in action"
    type: invocation
    command: "audit my API endpoints for security issues"
    result: |
      Intent matched: "audit security" + "API endpoints"
      Priority 3 (Audit) — most specific match: zuvo:api-audit (over zuvo:security-audit)

      Invoking: Skill(skill="zuvo:api-audit")

      [zuvo:api-audit activates with 10 dimensions: D1-D10 covering
       validation, authentication, pagination, error handling, caching,
       HTTP semantics, rate limiting, idempotency, contract stability...]

when_to_use: "using-zuvo is always loaded — it activates automatically on every message. There is no need to invoke it explicitly. It is the entry point that makes the other 38 skills accessible without memorizing commands."

when_not_to_use: "For simple questions ('what does this function do?'), one-line fixes, git commands, or file reading — using-zuvo recognizes these as boundary cases and passes them through directly without routing to a skill."

