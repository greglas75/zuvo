faq:
  - q: "What does using-zuvo do?"
    a: "It is the always-loaded skill router. Every developer message is matched against a routing table of 39 skills across 5 priority tiers. When intent matches a skill, the Skill tool is invoked automatically. When the task falls within boundary rules (simple questions, one-line fixes, git ops), it passes through without routing."
  - q: "How is using-zuvo different from just running /build or /review directly?"
    a: "Direct invocation is always supported — using-zuvo just makes it optional. The router handles ambiguous intent ('improve this code' could be review, refactor, or code-audit depending on context), enforces pipeline ordering (brainstorm before plan before execute), and catches cases where a more specific skill exists than the one the developer named."
  - q: "What are the 5 priority tiers?"
    a: "Pipeline (brainstorm → plan → execute for multi-file features), Task (build, debug, refactor, review, write-tests, fix-tests), Audit (13 audit skills from code-audit to seo-audit), Utility (backlog, docs, presentation, worktree), and Release (ship, deploy, canary, release-docs, retro). Within each tier, the most specific match wins over a general one."
  - q: "Can using-zuvo skip the brainstorm → plan → execute pipeline?"
    a: "No — pipeline enforcement is non-negotiable. If a user says 'build this feature' and no spec exists, the router redirects to zuvo:brainstorm. If a spec exists but no plan, it redirects to zuvo:plan. Each phase checks for its prerequisite artifact. The pipeline can be bypassed only when the user explicitly acknowledges the trade-off and the scope is bounded to 1-5 files (zuvo:build)."
  - q: "What triggers a direct response instead of a skill invocation?"
    a: "5 boundary rules: (1) simple questions answerable without code analysis, (2) one-line fixes (change a port, fix a typo), (3) git operations (commit, push, branch), (4) file reading ('show me the config'), (5) conversation ('what skills are available?'). The threshold: if the task requires reading code to understand it, writing more than a trivial change, or producing structured output — use a skill."

