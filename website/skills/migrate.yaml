problem: |
  Migrations are high-risk operations where mistakes are costly and hard to reverse. Database schema changes can lock tables, lose data, or break rollbacks. Framework upgrades introduce breaking API changes scattered across dozens of files. API version transitions require deprecation layers, consumer notification, and parallel endpoint support. Developers handling these manually forget rollback scripts, miss index additions, skip safety checks, and ship migrations that work forward but cannot be reversed. zuvo:migrate enforces a structured 4-phase process: detect the project's migration tooling automatically, analyze impact with risk classification, generate migration artifacts in the project's native format (with rollback), and verify safety with a pre-flight checklist covering backward compatibility, zero-downtime, data preservation, and consumer notification.

how_it_works:
  - step: "Phase 0: Detect Migration Context"
    description: "Read project context and auto-detect the ORM or migration framework from config files (Prisma, TypeORM, Knex, Django, Alembic, Rails, Drizzle, or raw SQL). Gather mode-specific context: current schema state for db mode, current package version and breaking changes for upgrade mode, or API version strategy and route definitions for api mode."
  - step: "Phase 1: Analyze Impact"
    description: "Assess the migration's impact. For db: classify each change as addition, modification, or deletion and flag destructive operations. For upgrade: find all usages of breaking APIs and classify as auto-fixable, manual-fix, or removed. For api: map all endpoints and classify as unchanged, modified, deprecated, or new. Assign risk level (LOW/MEDIUM/HIGH) based on destructiveness and scope."
  - step: "Phase 2: Generate Migration"
    description: "Generate migration files in the project's native format. For db: create forward migration with indexes, constraints, and defaults, plus rollback if --rollback and data script if --data. For upgrade: update manifest, apply codemods for breaking changes, flag manual fixes. For api: create versioned route structure, copy and modify endpoints, add deprecation headers, generate migration guide."
  - step: "Phase 3: Verify"
    description: "Run mode-specific verification: type checker, test suite, migration apply in preview mode, rollback apply. Report pass/fail for each check."
  - step: "Phase 4: Safety Checklist"
    description: "Evaluate 7 safety checks: backward compatible, rollback tested, zero-downtime possible, data preserved, indexes added, constraints have defaults, consumer notification. Print warnings for unchecked items with specific recommendations. Stage and commit."

output:
  artifact: "Migration files committed + rollback (if --rollback) + safety checklist + verification results"
  format: "A structured MIGRATION COMPLETE block with migration type, file paths, impact summary, risk level, rollback path, test results, verification matrix, safety score, and framework-specific deploy commands."
  sections:
    - "Type and framework"
    - "Migration file paths"
    - "Impact summary (files affected, changes)"
    - "Risk level with reason"
    - "Rollback path"
    - "Verification matrix (types, tests, apply, rollback)"
    - "Safety checklist score"
    - "Next steps (framework-specific deploy commands)"

examples:
  - title: "Migration complete block for a database schema change"
    type: output_sample
    sample:
      language: markdown
      code: |
        MIGRATION COMPLETE
        ----------------------------------------------------
        Type:       db (Prisma)
        Migration:  prisma/migrations/20260403120000_add_user_preferences/migration.sql
        Impact:     2 files affected, 1 table added, 2 columns added
        Risk:       LOW (additive only — new table with defaults)
        Rollback:   prisma/migrations/20260403120000_add_user_preferences/rollback.sql
        Tests:      passing
        Verify:     types PASS | tests PASS | apply PASS | rollback PASS
        Safety:     7/7 checks passed
        Commit:     f4e5d6c -- migrate: db add user_preferences table with indexes

        Next steps:
          npx prisma migrate deploy                -- apply to production
          zuvo:review prisma/migrations/            -- independent review
          git push origin feature/user-preferences  -- push when ready
        ----------------------------------------------------
    explanation: "The output shows a LOW risk additive migration with all safety checks passing. The framework-specific deploy command (prisma migrate deploy) is included in next steps."

  - title: "Framework upgrade invocation"
    type: invocation
    command: "zuvo:migrate upgrade next 15 --dry-run"
    result: |
      MIGRATION CONTEXT
        Mode:       upgrade
        Framework:  Next.js
        Current:    14.2.3
        Target:     15.x (latest)
        Tool:       pnpm
        Directory:  package.json

      IMPACT ANALYSIS
        Mode:       upgrade
        Files:      23 files affected
        Changes:    8 auto-fixable, 12 manual-fix, 3 removed
        Risk:       HIGH (>10 files affected, removed APIs)
        Reason:     3 APIs removed in Next.js 15, 12 call sites need manual review

      DRY RUN — no files modified. Run without --dry-run to proceed.

  - title: "API version migration with deprecation layer"
    type: before_after
    before:
      language: typescript
      code: |
        // routes/v1/orders.ts — current version
        router.get('/api/v1/orders', getOrders);
        router.post('/api/v1/orders', createOrder);
    after:
      language: typescript
      code: |
        // routes/v2/orders.ts — new version with schema changes
        router.get('/api/v2/orders', getOrdersV2);
        router.post('/api/v2/orders', createOrderV2);

        // routes/v1/orders.ts — deprecated with headers
        router.get('/api/v1/orders', deprecationMiddleware('2026-07-01'), getOrders);
        router.post('/api/v1/orders', deprecationMiddleware('2026-07-01'), createOrder);
    explanation: "API mode creates new versioned endpoints and adds deprecation middleware to old endpoints with a sunset date. A migration guide document is also generated."

when_to_use: |
  Use zuvo:migrate for any operation that changes database schemas (new tables, columns, indexes, constraints), upgrades frameworks or libraries across major versions (Next.js 14 to 15, Django 4 to 5), or transitions API versions with backward compatibility requirements. Especially valuable for high-risk migrations where rollback safety, zero-downtime, and data preservation matter.

when_not_to_use: |
  For general database performance analysis without schema changes, use zuvo:db-audit. For deploying already-created migrations to production, use zuvo:deploy. For checking dependency versions without upgrading, use zuvo:dependency-audit. For general refactoring that does not cross a version boundary, use zuvo:refactor. For feature implementation that happens to include a migration, use zuvo:build and handle the migration as part of the build.

