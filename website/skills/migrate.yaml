faq:
  - q: "What does zuvo:migrate do?"
    a: "It runs a structured 4-phase migration workflow: (0) auto-detect the project's ORM or migration framework, (1) analyze impact and classify risk, (2) generate migration files in the project's native format with rollback, (3) verify safety with type checking, tests, migration preview, and a 7-point safety checklist. It supports three modes: db for schema changes, upgrade for major dependency bumps, and api for versioned endpoint transitions."
  - q: "How does zuvo:migrate detect which ORM or migration tool to use?"
    a: "It scans for config files: prisma/schema.prisma for Prisma, ormconfig.ts for TypeORM, knexfile.ts for Knex, manage.py with Django imports for Django, alembic.ini for Alembic, db/migrate/ with Gemfile for Rails, drizzle.config.ts for Drizzle, or a migrations/ directory with raw SQL files. If none are detected, it asks you for the migration format."
  - q: "What does --dry-run do?"
    a: "--dry-run stops after Phase 1 (impact analysis) and prints the migration plan without generating or executing any files. No files are written, no commit is made. Use it to preview the scope and risk before committing to the migration."
  - q: "What does the safety checklist cover?"
    a: "Seven checks: backward compatibility (data survives rollback), rollback tested (down migration works), zero-downtime possible (no table locks on large tables), data preserved (no destructive DROP without backup), indexes added for new queries, constraints have defaults (NOT NULL columns have DEFAULT), and consumer notification (API clients informed of changes). Each unchecked item produces a specific warning with recommendations."
  - q: "Can I generate just the rollback without running the forward migration?"
    a: "Pass --rollback to generate the down/rollback migration alongside the forward migration. The rollback is generated explicitly even if the framework auto-generates reversible migrations, so you can review exactly what will happen on rollback."

arguments:
  - flag: "db [description]"
    description: "Database schema migration mode. Provide a description of the schema change (e.g., 'add user preferences table'). Generates migration in the project's native ORM format."
  - flag: "upgrade [package] [target-version]"
    description: "Framework/library major upgrade mode. Specify the package and target version (e.g., 'next 15'). Applies codemods for breaking changes and flags manual fixes."
  - flag: "api [version-spec]"
    description: "API version transition mode. Specify the version transition (e.g., 'v1->v2'). Creates versioned route structure with deprecation layer."
  - flag: "--dry-run"
    description: "Preview the migration plan and impact analysis without generating or executing files. Stops after Phase 1."
  - flag: "--rollback"
    description: "Generate an explicit rollback (down) migration alongside the forward migration."
  - flag: "--data"
    description: "Include a data transformation script alongside schema changes. Generates a separate file that runs after the schema migration."

