meta:
  slug: scaffold
  title: "Scaffold — Pattern-Based Code Generation"
  description: "Generates new modules, components, endpoints, and services by detecting existing patterns in the codebase. Finds a canonical example, extracts structural conventions, and replicates them — ensuring every new file matches project style exactly."
  category: task
  og_image: /og/skills/scaffold.png

seo:
  target_queries:
    - "code scaffolding from existing patterns Claude Code"
    - "generate component matching project conventions AI"
    - "pattern-based code generation from codebase examples"
    - "scaffold endpoint service model from canonical template"
    - "automated module generation project style detection"
  canonical: /en/skills/scaffold

stats:
  - label: Supported Types
    value: "8"
    detail: "component, endpoint, service, model, hook, middleware, page, worker"
  - label: Phases
    value: "4"
    detail: "Detect Project Patterns, Analyze Pattern, Generate, Validate"
  - label: Auto-Detected Conventions
    value: "6"
