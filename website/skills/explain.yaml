problem: |
  Understanding complex code requires building a mental model of execution paths, dependencies, and data flows — a process that can take hours of reading through files. Visual diagrams make these relationships instantly clear, but creating them manually is tedious and they go stale immediately. zuvo:explain generates accurate Mermaid diagrams directly from the codebase, with annotated walkthroughs tailored to the audience. New team members get simplified explanations, managers get business-level overviews, and developers get full technical detail with file references and edge case documentation.

how_it_works:
  - step: "Phase 0: Understand Target"
    description: "Resolve the user's input to a concrete code location (file, function, directory, or model). Determine the diagram mode — explicitly provided or inferred from the target type. Gather context using CodeSift (trace_call_chain, detect_communities, find_references) or fallback to grep and file reading."
  - step: "Phase 1: Analyze Structure"
    description: "Map relationships relevant to the chosen mode. For flow: trace execution paths, decision points, async boundaries, and side effects. For deps: list imports and reverse dependencies, group by layer. For arch: map directory structure with purpose annotations, cross-module dependencies. For data: trace from input to validation to storage to output. Classify complexity as SIMPLE, MEDIUM, or COMPLEX."
  - step: "Phase 2: Generate Diagrams"
    description: "Produce Mermaid diagrams using real names from the codebase (not generic placeholders). Flow mode generates sequence diagrams for multi-actor flows or flowcharts for single-function branching. Deps mode generates dependency graphs with direct and reverse dependencies. Arch mode generates architecture maps with module boundaries. Data mode generates data flow diagrams from input to persistence."
  - step: "Phase 3: Annotated Walkthrough"
    description: "Write a step-by-step explanation adapted to the audience level. Dev: file references, edge cases, key code snippets. New: plain language, analogies, no jargon. Manager: business actions, data flow in non-technical terms, user impact."
  - step: "Phase 4: Save or Display"
    description: "If --save is provided, write a Markdown file with embedded Mermaid blocks, walkthrough, and metadata. Otherwise print directly to console. For COMPLEX targets, generate a high-level overview plus detail sub-diagrams and suggest targeted follow-ups."

output:
  artifact: "Mermaid diagram(s) + annotated walkthrough"
  format: "Markdown with embedded Mermaid blocks, optionally saved to a file. Includes diagram, step-by-step walkthrough, and complexity metadata."
  sections:
    - "Diagram (Mermaid block — sequence, flowchart, graph, or data flow)"
    - "Walkthrough (annotated steps adapted to audience level)"
    - "Metadata (complexity, node count, source files)"

examples:
  - title: "Explain a payment flow for a new developer"
    type: invocation
    command: "zuvo:explain flow src/services/order.ts:createOrder --audience new"
    result: |
      TARGET RESOLVED
        Subject:    src/services/order.ts:createOrder
        Mode:       flow
        Depth:      2
        Audience:   new
        CodeSift:   available

      EXPLANATION COMPLETE
        Target:      src/services/order.ts:createOrder
        Type:        flow (sequence diagram)
        Complexity:  MEDIUM (8 nodes, 2 async boundaries)
        Diagram:     Mermaid sequenceDiagram (24 lines)
        Walkthrough: 6 steps, audience: new
        Saved:       printed to console

  - title: "Architecture map saved to file"
    type: invocation
    command: "zuvo:explain arch src/modules/payments --audience manager --save docs/explanations/payments.md"
    result: |
      EXPLANATION COMPLETE
        Target:      src/modules/payments
        Type:        arch (architecture map)
        Complexity:  COMPLEX (18 nodes, 3 service boundaries)
        Diagram:     Mermaid graph TB (42 lines) + 2 detail sub-diagrams
        Walkthrough: 8 steps, audience: manager
        Saved:       docs/explanations/payments.md

  - title: "Dependency graph output sample"
    type: output_sample
    sample:
      language: mermaid
      code: |
        graph TD
            subgraph "Direct dependencies"
                Target["auth.service.ts"]
                Target --> JwtUtils["jwt-utils.ts"]
                Target --> UserRepo["user.repository.ts"]
                Target --> Config["auth.config.ts"]
            end

            subgraph "Reverse dependencies (importers)"
                AuthController["auth.controller.ts"] --> Target
                AuthGuard["auth.guard.ts"] --> Target
                UserService["user.service.ts"] --> Target
            end

            style Target fill:#f9f,stroke:#333,stroke-width:2px
    explanation: "Dependency graphs use real file names from the codebase. The target is highlighted with Mermaid styling. Direct dependencies flow downward, reverse dependencies (importers) flow inward."

when_to_use: |
  Use zuvo:explain when you need to understand how code works visually: onboarding onto a new codebase, explaining a complex flow to a teammate, preparing a technical presentation, documenting architecture for stakeholders, or tracing how data moves through the system. Choose the mode based on what you need to understand: flow for execution paths, deps for import relationships, arch for module structure, data for data lifecycle.

when_not_to_use: |
  For generating project documentation (README, API docs), use zuvo:docs. For architecture decision records and structural analysis, use zuvo:architecture. For reviewing code quality or recent changes, use zuvo:design-review. zuvo:explain produces visual explanations, not assessments or recommendations.

