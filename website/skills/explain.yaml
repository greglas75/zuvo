  - slug: design-review
    relation: "zuvo:design-review evaluates design quality; zuvo:explain visualizes how the design works"

faq:
  - q: "What diagram types does zuvo:explain produce?"
    a: "Four types: flow (sequence diagrams or flowcharts for execution paths), deps (dependency graphs showing imports and importers), arch (architecture maps with module boundaries and cross-module dependencies), and data (data flow diagrams from input to storage to output). The type is chosen explicitly or inferred from the target."
  - q: "What are the audience levels?"
    a: "Three levels: dev (full technical detail with file references, edge cases, and code snippets), new (simplified language with analogies, no jargon), and manager (business-level overview with user impact, no code references). Default is dev."
  - q: "Where do the diagrams render?"
    a: "Mermaid diagrams render natively in GitHub README and PR descriptions, VS Code with the Mermaid extension, Notion, Confluence, and most modern Markdown viewers. No external tools or accounts are required."
  - q: "What happens with very complex code?"
    a: "If the target has more than 15 nodes (classified as COMPLEX), zuvo:explain generates a high-level overview diagram first, then detail sub-diagrams for each major section. It also suggests targeted follow-up commands to explore specific areas at depth."
  - q: "Can I save the output to a file?"
    a: "Yes, use --save [path] to write a Markdown file with embedded Mermaid blocks, the annotated walkthrough, and metadata (complexity, node count, source files). Without --save, everything is printed to the console."

arguments:
  - flag: "flow [function/endpoint]"
    description: "Generate an execution flow diagram (sequence diagram or flowchart) for a function, endpoint, or event handler."
  - flag: "deps [file/module]"
    description: "Generate a dependency graph showing what the target imports and what imports the target."
  - flag: "arch [directory]"
    description: "Generate an architecture map of a directory showing module boundaries, cross-module dependencies, and external integrations."
  - flag: "data [model/entity]"
    description: "Generate a data flow diagram showing how data moves from input through validation, business logic, and storage to output."
  - flag: "--depth [N]"
    description: "How many levels deep to trace callers, callees, or importers. Default: 2."
  - flag: "--audience [dev/new/manager]"
    description: "Detail level for the annotated walkthrough. dev=full detail, new=simplified, manager=high-level. Default: dev."
  - flag: "--save [path]"
    description: "Save explanation to file as Markdown with embedded Mermaid. Default: print to console."

