  description: "Generate visual explanations of code through Mermaid diagrams and annotated walkthroughs. Four modes: flow (execution paths), deps (dependency graphs), arch (architecture maps), data (data flow diagrams). Supports audience targeting (dev, new, manager) and configurable depth."
