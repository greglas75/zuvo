schema_version: 1
last_synced: "2026-03-29"

meta:
  slug: ship
  title: "ship — Pre-merge Release Pipeline in 5 Phases"
  description: "Run tests, auto-scaled code review, version bump, changelog, git tag, and push — all in 1 command. Scales review depth across 4 levels by diff LOC."
  category: release
  og_image: /og/skills/ship.png

seo:
  target_queries:
    - "automate version bump and changelog before merge"
    - "pre-merge release pipeline Claude Code"
    - "auto-scale code review by diff size git"
    - "conventional commits version bump automation"
    - "git tag and push release workflow CLI"
  canonical: /en/skills/ship

stats:
  - label: Phases
    value: "5"
    detail: "Pre-flight → Tests → Review → Bump → Tag+Push"
  - label: Review Depths
    value: "4"
    detail: "none / light / full / full+coverage"
  - label: Ecosystems
    value: "6+"
