when_to_use: |
  Use zuvo:threat-model before launching a new feature or service to identify security risks proactively, during security reviews or compliance preparation, after adding new entry points or trust boundaries, when onboarding security-sensitive integrations (payment, auth, PII handling), or periodically to ensure the threat model stays current with the codebase. Use --focus to scope to a specific domain (auth, data, api, infra) and --depth to control analysis thoroughness.

when_not_to_use: |
  For active exploitation testing of known vulnerabilities, use zuvo:pentest. For scanning existing code for security anti-patterns and known vulnerabilities, use zuvo:security-audit. For general code review, use zuvo:review. For architecture decision records without a security focus, use zuvo:architecture. zuvo:threat-model identifies what COULD be broken; zuvo:pentest tests what IS broken; zuvo:security-audit checks for known bad patterns.

