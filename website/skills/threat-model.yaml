faq:
  - q: "What is STRIDE and how does zuvo:threat-model use it?"
    a: "STRIDE is a threat classification framework: Spoofing (impersonation), Tampering (data modification), Repudiation (deniability of actions), Information Disclosure (data leaks), Denial of Service (availability disruption), and Elevation of Privilege (unauthorized access). zuvo:threat-model evaluates each entry point and component against all 6 categories, producing a matrix that highlights where threats exist with code-backed evidence."
  - q: "What are the depth levels?"
    a: "Three levels: quick (top 5 highest-risk entry points, 2-3 flows, threat per component without evidence), standard (all entry points, 3-5 flows, threats with code evidence), and deep (all entry points plus background jobs, all flows, full STRIDE matrix with mitigations and Mermaid diagrams). Default is standard."
  - q: "How are risk levels determined?"
    a: "Each threat is scored on a likelihood-by-impact matrix. High likelihood + critical impact = CRITICAL. The four risk levels determine action priority: CRITICAL requires immediate action with specific code fix locations, HIGH should be addressed this sprint, MEDIUM planned for next sprint, LOW documented and monitored."
  - q: "What does --focus do?"
    a: "It scopes the analysis to a specific threat domain: auth (emphasis on Spoofing and Elevation of Privilege — token handling, session management, password storage, OAuth, MFA), data (Tampering and Information Disclosure — encryption, access controls, data retention, GDPR), api (Spoofing, Tampering, Information Disclosure — input validation, rate limiting, auth coverage, response filtering), infra (Denial of Service and Tampering — DDoS protection, config secrets, container security, supply chain)."
  - q: "Does zuvo:threat-model generate diagrams?"
    a: "Yes. With the --diagram flag (or automatically at --depth deep), it generates Mermaid data flow diagrams showing trust boundaries, data sensitivity annotations, and protocol labels on each edge. These render in GitHub, VS Code, and most Markdown viewers."

arguments:
  - flag: "<path or module>"
    description: "Scope the threat model to a specific directory or module. If omitted, models the entire project."
  - flag: "--focus [auth|data|api|infra]"
    description: "Focus on a specific threat domain, emphasizing relevant STRIDE categories for that domain."
  - flag: "--depth [quick|standard|deep]"
    description: "Analysis depth. quick: top 5 entry points. standard: all entry points with evidence. deep: full matrix with diagrams. Default: standard."
  - flag: "--output [path]"
    description: "Save report to specific path. Default: docs/threat-model.md."
  - flag: "--diagram"
    description: "Generate Mermaid data flow diagrams with trust boundaries and data sensitivity annotations. Enabled by default at --depth deep."

