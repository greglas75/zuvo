problem: |
  Threat modeling is traditionally done on whiteboards or in documents disconnected from the actual codebase. The result is a model that goes stale the moment code changes — trust boundaries shift, new entry points are added, and data flows evolve without the threat model being updated. zuvo:threat-model solves this by analyzing the actual code to map attack surfaces, trace data flows across trust boundaries, and systematically evaluate STRIDE threats per component. Every threat is backed by code evidence (file references, line numbers), and the output includes Mermaid data flow diagrams that can be regenerated as the codebase evolves.

how_it_works:
  - step: "Phase 0: Map Attack Surface"
    description: "Systematically identify all components that interact with external actors or handle sensitive data: API endpoints, file uploads, webhooks, CLI commands, background jobs, SSR entry points. Catalog data stores (databases, caches, file storage, session stores), external integrations (auth providers, payment, email, analytics), trust boundaries (unauthenticated to authenticated, user to admin, client to server), and sensitive data types (PII, credentials, financial, health)."
  - step: "Phase 1: Data Flow Analysis"
    description: "Identify 3-7 critical data flows (authentication, primary business flow, payment, user data, admin operations). Trace each from entry point through validation, processing, storage, and output, noting trust boundary crossings. Generate Mermaid data flow diagrams with protocol, trust level, and data sensitivity annotations on each edge."
  - step: "Phase 2: STRIDE Analysis"
    description: "Evaluate all 6 STRIDE categories for each entry point and component. Produce a per-component STRIDE matrix showing threat status. For each identified threat, document the scenario, code evidence, likelihood, impact, risk level, and specific mitigation with code reference. Depth scales from quick (top 5 entry points) to standard (all entry points) to deep (full matrix with diagrams)."
  - step: "Phase 3: Risk Assessment"
    description: "Score each threat on a likelihood-by-impact matrix producing CRITICAL, HIGH, MEDIUM, or LOW risk levels. Group threats by risk level with specific remediation guidance: CRITICAL includes exact code fix locations and effort estimates, HIGH includes mitigation approach and CQ gate references, MEDIUM includes recommendations, LOW is documented for monitoring."
  - step: "Phase 4: Generate Report"
    description: "Save a structured threat model report to docs/threat-model.md with executive summary, attack surface table, data flow diagrams (Mermaid), STRIDE matrix, threat details grouped by risk level, mitigations summary with priority and effort estimates, and ordered recommendations."
  - step: "Phase 5: Create Action Items"
    description: "Persist CRITICAL and HIGH threats to memory/backlog.md as high-severity entries. Suggest the appropriate remediation skill for each threat type: zuvo:hotfix for simple code fixes, zuvo:security-audit then zuvo:build for missing validation, zuvo:architecture for architecture gaps, zuvo:pentest for deeper testing, zuvo:write-tests for missing security tests."

output:
  artifact: "Threat model report + Mermaid data flow diagrams + backlog action items"
  format: "A structured Markdown threat model saved to docs/threat-model.md with attack surface inventory, data flow diagrams, STRIDE matrix, ranked threat details, and mitigations summary."
  sections:
    - "Executive Summary (overall risk posture, critical findings, top recommendation)"
    - "Attack Surface (entry points, data stores, external services, trust boundaries)"
    - "Data Flow Diagrams (Mermaid DFDs with trust boundaries and data sensitivity)"
    - "STRIDE Matrix (per-component threat evaluation table)"
    - "Threat Details (grouped by CRITICAL, HIGH, MEDIUM, LOW with code evidence)"
    - "Mitigations Summary (priority, effort, recommended skill for each)"
    - "Recommendations (ordered security improvements)"

