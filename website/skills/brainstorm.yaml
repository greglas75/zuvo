faq:
  - q: "What does zuvo:brainstorm produce?"
    a: "It produces an approved design specification document at docs/specs/YYYY-MM-DD-<topic>-spec.md. The spec includes a problem statement, design decisions, solution overview, data model, API surface, integration points, edge cases, acceptance criteria, and out-of-scope boundaries. Status is set to Approved only after you sign off on every section."
  - q: "How is zuvo:brainstorm different from zuvo:build?"
    a: "zuvo:brainstorm is for full design exploration when the right approach is not obvious — it runs 3 research agents, conducts a design dialogue, and produces a spec document. zuvo:build is for implementing a concrete, scoped change (1-5 files) where you already know what to build. Think of brainstorm as the design phase and build as the coding phase."
  - q: "How long does a brainstorm session take?"
    a: "A typical brainstorm session takes 15-30 minutes of calendar time. Phase 1 (3 parallel agents) runs in the background while you review findings, Phase 2 involves 2-5 clarifying questions, and Phase 3 produces and reviews the spec document. Complex subsystems with many integration points take longer."
  - q: "Can zuvo:brainstorm handle multiple unrelated features at once?"
    a: "No — by design. If you describe multiple subsystems, brainstorm asks you to pick one. Each subsystem gets its own spec. Trying to brainstorm everything at once produces vague specs that cannot drive implementation. Run brainstorm once per cohesive feature area."
  - q: "What happens if a brainstorm agent fails?"
    a: "If one of the 3 parallel agents fails, brainstorm proceeds with the two successful reports and notes the gap. If two or more agents fail, you are informed and can choose to continue with limited context or investigate the failures first. The skill never silently continues with missing research."

arguments:
