agents:
  - name: Code Explorer
    role: "Maps relevant modules, patterns, blast radius, and similar existing code in your codebase using CodeSift analysis tools."
  - name: Domain Researcher
    role: "Investigates external libraries, APIs, established patterns, and prior art relevant to the requested feature."
  - name: Business Analyst
    role: "Identifies edge cases, existing pain points, and acceptance criteria candidates from a product and user perspective."
  - name: Spec Reviewer
    role: "Automated reviewer that checks the draft spec for completeness, consistency, YAGNI violations, ambiguity, and scope gaps — up to 3 iterations before user review."

