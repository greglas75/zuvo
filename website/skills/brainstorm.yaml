problem: |
  Starting to code before you understand the problem produces rework. Developers build the wrong abstraction, discover edge cases mid-implementation, or duplicate functionality that already exists in the codebase. A 30-minute design conversation prevents days of refactoring — but without structure, that conversation stays superficial. zuvo:brainstorm runs 3 parallel agents to surface everything relevant (existing code, prior art, business edge cases) before a single line is written, then guides you through a systematic design dialogue to produce a locked, approved spec.

how_it_works:
  - step: "Phase 0: Scope Check"
    description: "The skill assesses whether the request is a single concern or spans multiple subsystems. If multiple subsystems are detected, it asks you to pick one — each subsystem gets its own spec to prevent vague designs that cannot drive implementation."
  - step: "Phase 1: Parallel Agent Dispatch"
    description: "3 agents run simultaneously: the Code Explorer maps relevant modules, blast radius, and existing patterns in your codebase; the Domain Researcher investigates external libraries, APIs, and prior art; the Business Analyst identifies edge cases, existing pain points, and acceptance criteria candidates."
  - step: "Phase 2: Design Dialogue"
    description: "Findings are summarized by dimension, then you answer 2-5 targeted clarifying questions (one at a time, with trade-off options). The skill proposes 2-3 named design approaches with files affected, trade-offs, and a recommended choice."
  - step: "Phase 2: Section-by-Section Approval"
    description: "The design is walked through in 5 sections — overall approach, data model, API surface, integration points, edge case handling — with your sign-off required on each before moving forward."
  - step: "Phase 3: Spec Document + Automated Review"
    description: "The spec is written to docs/specs/YYYY-MM-DD-<topic>-spec.md, then reviewed by a Spec Reviewer agent checking for completeness, YAGNI violations, ambiguity, and scope gaps. Up to 3 automated iterations before user approval locks the status as Approved."

output:
  artifact: "docs/specs/YYYY-MM-DD-<topic>-spec.md"
  format: "A structured Markdown spec with status Approved, covering problem statement, design decisions, solution overview, data model, API surface, integration points, edge cases, acceptance criteria, out-of-scope list, and open questions."
  sections:
    - "Problem Statement"
    - "Design Decisions"
    - "Solution Overview"
    - "Detailed Design (Data Model, API Surface, Integration Points)"
    - "Edge Cases"
    - "Acceptance Criteria"
    - "Out of Scope"
    - "Open Questions"

examples:
  - title: "Starting the pipeline for a new notifications feature"
    type: invocation
    command: "zuvo:brainstorm add real-time notifications for order status changes"
    result: |
      Scope detected: single concern (notification delivery for order events).
      Dispatching 3 agents in parallel...

      WHAT EXISTS IN CODEBASE: notification.service.ts already handles email. WebSocket module is present but unused. Order events fire via EventEmitter.
      EXTERNAL RESEARCH: Socket.io, SSE, and Supabase Realtime are established approaches for this stack.
      BUSINESS ANALYSIS: Edge cases include offline users, duplicate events, notification fatigue.

      Question 1: The codebase already has a WebSocket module in src/ws/. Should this feature use it, or is this better served by SSE given the read-only nature of status updates? (A) Use WebSocket — bidirectional for future use, (B) Use SSE — simpler, one-directional, less overhead.

  - title: "Approved spec ready for planning"
    type: output_sample
    sample:
      language: markdown
      code: |
        # Order Status Notifications — Design Specification

        > **Date:** 2026-03-29
        > **Status:** Approved
        > **Author:** zuvo:brainstorm

        ## Problem Statement
        Users discover order status changes only by refreshing the page...

        ## Acceptance Criteria
        1. Status changes appear within 2 seconds without page refresh
        2. Notification persists for 5 seconds then auto-dismisses
        3. Works when user has multiple tabs open (no duplicates)
    explanation: "The approved spec becomes the input artifact for zuvo:plan. Nothing is built until this document exists with Status: Approved."

when_to_use: |
  Use zuvo:brainstorm when you want to create a new feature, add significant functionality, or redesign a subsystem — especially when the feature touches multiple parts of the project or when the right approach is not yet obvious. It is the first stage of the brainstorm → plan → execute pipeline. The prerequisite is a user request; the output is an approved spec that unlocks zuvo:plan.

when_not_to_use: |
  For small, self-contained changes to 1-5 files where the approach is clear, use zuvo:build instead — it skips spec production and goes straight to implementation with quality gates. For features where a spec already exists and you are ready to plan implementation tasks, skip brainstorm and start with zuvo:plan. If you already have an approved plan and want to start coding, go directly to zuvo:execute.

