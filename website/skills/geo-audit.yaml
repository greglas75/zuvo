    - ["SSR vs client-side JSON-LD detection", "Yes (CG5)", "No", "Yes — GCG3 critical gate"]
    - ["seo-audit import (no re-scanning)", "N/A", "No", "Yes — D3/D5/D9/D10 imported automatically"]
    - ["Content chunkability (H2/H3 structure)", "No", "Manual", "Yes — G10 heading quality"]
    - ["llms.txt quality analysis", "Basic (D10-1)", "No", "Yes — G3 3-check depth"]
