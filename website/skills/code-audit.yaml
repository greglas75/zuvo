faq:
  - q: "What does zuvo:code-audit check that ESLint doesn't?"
    a: "ESLint checks syntax and style rules. zuvo:code-audit checks behavioral correctness: are multi-table mutations in transactions (CQ9)? Are guards reinforced by query-level ownership filters (CQ4)? Is money arithmetic done with integer-cents rather than floats (CQ16)? These require reading code intent across multiple lines — something lint rules cannot express."
  - q: "How is zuvo:code-audit different from zuvo:review?"
    a: "zuvo:review evaluates a diff (uncommitted changes, a PR, or a commit range) for one feature or fix. zuvo:code-audit sweeps the entire codebase in batches — it is designed to find debt that accumulated over months, not just what changed today."
  - q: "How long does a code audit take?"
    a: "Quick mode processes ~50 files in about 2 minutes using 10 files/batch. Deep mode with full evidence takes roughly 15 minutes for the same scope. Auditing a single file with `zuvo:code-audit [file]` forces deep mode and typically returns in under a minute."
  - q: "Can zuvo:code-audit auto-fix issues it finds?"
    a: "No — the audit is strictly read-only. It generates a prioritized fix plan pointing to exact file:line locations. For structural fixes (extracting duplicated logic, splitting god files), the plan will suggest `zuvo:refactor`. For systematic patterns across many files, `zuvo:fix-tests` handles the test equivalent."
  - q: "What frameworks and languages does it support?"
    a: "The CQ1-CQ22 checklist applies to any language. ORM-specific checks (CQ9, CQ17, CQ20) auto-activate when Prisma, TypeORM, SQLAlchemy, or Django is detected. React-specific gates (CQ22 for cleanup, CQ13 for dead exports) activate on .tsx/.jsx files. Python, PHP, and Go are supported with adjusted heuristics."

arguments:
  - flag: "all"
    description: "Audit every production file in the project (default scope)"
  - flag: "[path]"
    description: "Audit production files under a specific directory"
  - flag: "[file]"
    description: "Audit a single file with full evidence (forces --deep mode)"
  - flag: "--deep"
    description: "Collect per-gate evidence and fix recommendations for every file; uses Opus-class model for batch agents"
  - flag: "--quick"
    description: "Binary pass/fail only, no evidence; 10 files/batch; ~2 min for 50 files"
  - flag: "--services"
    description: "Restrict scope to service and business logic files"
  - flag: "--controllers"
    description: "Restrict scope to controller, handler, and route files"

checks:
  sections:
    - name: "Quality Gates"
      id_range: "CQ1-CQ22"
      count: 22
      items:
        - id: "CQ3"
          name: "Boundary validation complete — required fields, format/range, runtime schema"
          critical: true
        - id: "CQ4"
          name: "Guards reinforced by query-level filtering — guard is NOT the sole defense"
          critical: true
        - id: "CQ5"
          name: "No sensitive data in logs, errors, or API responses"
          critical: true
        - id: "CQ6"
          name: "No unbounded memory from external data — pagination or streaming present"
          critical: true
        - id: "CQ8"
          name: "Infrastructure failures handled — timeouts on outbound calls, no empty catch"
          critical: true
        - id: "CQ14"
          name: "No duplicated logic blocks over 10 lines"
          critical: true
        - id: "CQ9"
          name: "Multi-table mutations wrapped in transactions"
          critical: false
        - id: "CQ16"
          name: "Money fields use exact arithmetic — no float for prices or discounts"
          critical: false
    - name: "Anti-Patterns"
      id_range: "CAP1-CAP14"
      count: 14
      items:
        - id: "CAP5"
          name: "Hardcoded secret (API key, password, token in source) — AUTO TIER-D"
          critical: true
        - id: "CAP6"
          name: "dangerouslySetInnerHTML without DOMPurify — AUTO TIER-D"
          critical: true
        - id: "CAP7"
          name: "eval() or new Function() with dynamic input — AUTO TIER-D"
          critical: true
        - id: "CAP8"
          name: "SQL string concatenation with user input — AUTO TIER-D"
          critical: true
        - id: "CAP1"
          name: "Empty catch block"
          critical: false
        - id: "CAP11"
          name: "parseFloat or Number() on a money field"
          critical: false

