problem: |
  Production codebases accumulate quality debt silently. A single unvalidated input, hardcoded credential, or empty catch block can sit in a service file for months before it causes an incident. Manual code review catches some issues during PRs, but it rarely covers the entire codebase systematically. `zuvo:code-audit` runs every production file through a consistent 22-gate binary checklist so nothing falls through the cracks — and surfaces the worst files first.

how_it_works:
  - step: "Discovery and classification"
    description: "The skill locates all production files, excludes tests and build artifacts, then classifies each file by type (SERVICE, CONTROLLER, GUARD, HOOK, ORM, etc.) to activate the relevant conditional gates."
  - step: "Red-flag pre-scan"
    description: "Before the full checklist, each batch agent scans for instant Tier-D triggers: hardcoded secrets, SQL string concatenation, eval() with dynamic input, and dangerouslySetInnerHTML without sanitization."
  - step: "CQ1-CQ22 evaluation"
    description: "Every applicable gate is scored binary (1/0/N/A). CodeSift pre-populates CQ8 (empty catch), CQ13 (dead code), and CQ14 (duplicated logic) with deterministic tool-verified findings when available."
  - step: "Aggregate and cross-file analysis"
    description: "Results are aggregated into a tier distribution table. Cross-file checks detect inconsistent transaction usage, validation chain gaps, and project-wide money-handling drift."
  - step: "Execution plan"
    description: "A prioritized fix plan (P0 blockers → P1 high-risk → P2 maintenance) maps each issue to its file and line with estimated effort. Findings are persisted to the project backlog."

output:
  artifact: "audits/code-quality-audit-YYYY-MM-DD.md"
  format: "Markdown report with summary tier table, critical gate failures, anti-pattern hotspots, per-file scores, cross-file issues, and a ranked execution plan."
  sections:
    - "Summary by Tier (A/B/C/D counts and percentages)"
    - "Summary by Code Type (SERVICE, CONTROLLER, etc.)"
    - "Critical Gate Failures"
    - "Red Flag Summary (Auto Tier-D)"
    - "Top Failed CQs (frequency ranking)"
    - "Anti-pattern Hot Spots"
    - "Per-file detail blocks"
    - "Cross-File Issues"
    - "Recommended Execution Plan"

examples:
  - title: "Audit all files in quick mode"
    type: invocation
    command: "zuvo:code-audit all --quick"
    result: "Scans every production file at 10 files/batch. Returns tier distribution and top CQ failures in ~2 minutes for 50 files. No per-gate evidence — use for triage."
  - title: "Deep dive on a service directory"
    type: invocation
    command: "zuvo:code-audit src/services --deep"
    result: "Full CQ1-CQ22 evidence for every service file. Outputs per-gate rationale at file:line format and a fix plan. Takes ~5 minutes for 20 files."
  - title: "Hardcoded secret auto-flagged Tier D"
    type: before_after
    gate: "CAP5"
    before:
      language: typescript
      code: |
        const STRIPE_KEY = "sk_live_abc123xyz";
        export async function charge(amount: number) {
          return stripe.charges.create({ amount, currency: "usd" });
        }
    after:
      language: typescript
      code: |
        const STRIPE_KEY = process.env.STRIPE_SECRET_KEY;
        if (!STRIPE_KEY) throw new Error("STRIPE_SECRET_KEY is required");
        export async function charge(amount: number) {
          return stripe.charges.create({ amount, currency: "usd" });
        }
    explanation: "CAP5 triggers AUTO TIER-D. The skill flags exact file:line, skips the full CQ checklist, and puts the file at the top of the P0 fix queue."

when_to_use: "Run `zuvo:code-audit` periodically (before releases, after adding many files, or when onboarding a new codebase). It is designed for batch triage — not for reviewing a single diff or a new feature. Use `--quick` for a fast health check and `--deep` when you need evidence before a major refactor."

when_not_to_use: "For per-PR or per-diff review, use `zuvo:review` instead — it focuses on changes, not the entire codebase. For test file quality, use `zuvo:test-audit`. For architectural concerns (circular deps, layer violations), use `zuvo:structure-audit` or `zuvo:architecture`."

