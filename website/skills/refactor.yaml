when_to_use: |
  Use zuvo:refactor when restructuring existing code: extracting methods, splitting large files, breaking circular dependencies, introducing interfaces, fixing error handling patterns, deleting dead code, or improving test files. It is also the right tool when you inherit a god class (600+ lines, 5+ responsibilities) that needs iterative decomposition. No new features — use zuvo:build for that.

when_not_to_use: |
  For bug investigation and fixes, use zuvo:debug. For new feature development, use zuvo:build (1-5 files) or the brainstorm → plan → execute pipeline. For reviewing code quality without making changes, use zuvo:code-audit. For large-scale code quality sweeps across many files, zuvo:refactor batch mode is appropriate, but start with zuvo:code-audit to identify which files need work.

