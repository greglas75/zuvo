        GOD_CLASS DETECTED: src/services/order.service.ts (847L, 7 responsibilities)
        Escalating to extended splitting protocol.

        Responsibilities identified:
          1. Order creation and validation (create, validate, checkInventory) — 4 external deps
          2. Pricing calculation (calculateTotal, applyDiscount, formatCents) — 2 external deps
          3. Notification dispatch (sendConfirmation, notifyWarehouse) — 3 external deps
          4. Status management (markShipped, markDelivered, cancelOrder) — 2 external deps
          5. Reporting (generateInvoice, exportCSV) — 1 external dep
