faq:
  - q: "What refactoring types does zuvo:refactor support?"
    a: "10 types are auto-detected from keywords: EXTRACT_METHODS, SPLIT_FILE, BREAK_CIRCULAR, MOVE, RENAME_MOVE, INTRODUCE_INTERFACE, FIX_ERROR_HANDLING, DELETE_DEAD, SIMPLIFY, and IMPROVE_TESTS (for test files). GOD_CLASS is a special escalation that overrides the detected type when a file exceeds 600 lines and has 5+ distinct responsibilities."
  - q: "How is zuvo:refactor different from just editing files manually?"
    a: "zuvo:refactor enforces 4 structural guarantees manual editing lacks: (1) a CQ pre-audit with all 22 gates before changes, (2) a behavioral baseline via existing or new tests, (3) an independent CQ Auditor agent that catches N/A abuse and rubber-stamped gates after changes, and (4) a post-audit score that must not regress below the pre-audit score. The CONTRACT.json also survives session crashes."
  - q: "What is the GOD_CLASS protocol?"
    a: "When a file exceeds 600 lines AND has 5+ distinct responsibilities, zuvo:refactor escalates to the GOD_CLASS protocol. Responsibilities are mapped and ordered by their number of internal dependencies — the group with fewest dependencies is extracted first. Each extraction creates one new module, updates imports, runs the full test suite, and commits before the next extraction begins. This prevents the common mistake of extracting everything at once and ending up with broken imports and failing tests."
  - q: "Can a refactoring session be interrupted and resumed?"
    a: "Yes — this is the purpose of CONTRACT.json. The file is created at the project root when a refactoring begins and records the current ETAP stage, CQ scores, scope fence, and backup branch. Running zuvo:refactor continue loads the CONTRACT and resumes from the last recorded stage. The CONTRACT is marked COMPLETE only when the session finishes cleanly."
  - q: "How does batch mode work?"
    a: "zuvo:refactor batch <queue-file> processes a list of files through the full ETAP pipeline autonomously with zero interactive stops. Each file gets a CQ pre-audit, full refactoring, CQ post-audit, and one commit. The queue file is updated with results: [x] for completed (with before/after scores and commit hash), [!] for failures (with reason and partial progress). Running the command again on the same queue file skips completed and failed entries."

arguments:
  - flag: "(none)"
    description: "Full mode — interactive approval gates at plan and test phases."
  - flag: "auto"
    description: "Skip the test-phase approval gate. Plan approval gate is still required."
  - flag: "quick"
    description: "Lightweight mode for small refactors — no sub-agents, no CONTRACT.json, no backlog. Auto-selected for files under 120 lines with low-risk types."
  - flag: "standard"
    description: "CONTRACT + ETAP stages but no sub-agents. Auto-selected for 120-400 line files with non-GOD_CLASS types."
  - flag: "no-commit"
    description: "Full mode but show git diff and proposed message instead of committing. User controls git history."
  - flag: "plan-only"
    description: "Stop after ETAP-1A — produce the plan without executing it."
  - flag: "continue"
    description: "Load CONTRACT.json and resume from the last recorded ETAP stage."
  - flag: "batch <file>"
    description: "Process a queue file of files through the full pipeline with zero interactive stops."

checks: null

frameworks:
  - TypeScript
  - JavaScript
  - Python
  - React / Next.js
  - NestJS
  - PHP

modes:
  - name: "quick"
    description: "For files under 120 lines with low-risk types. No sub-agents, CONTRACT.json, or backlog. Inline CQ audit."
  - name: "standard"
    description: "For 120-400 line files. CONTRACT.json, ETAP stages, inline CQ before/after. No sub-agents."
  - name: "full"
    description: "Default. Sub-agents, backup branch, CONTRACT.json, ETAP-1A + 1B + 2, agent-verified CQ, backlog."
  - name: "auto"
    description: "Full mode minus the test-phase approval stop. Still requires plan approval."
  - name: "batch"
    description: "Processes a queue file autonomously. Zero stops, one commit per file, failure logging."

agents:
  - name: Dependency Mapper
    role: "Traces all importers and callers of the target file, maps exported symbols to their consumers, and flags dependents that will break if exports change."
  - name: Existing Code Scanner
    role: "Searches the codebase for existing utilities and patterns similar to planned extractions, preventing accidental duplication of helpers."
  - name: CQ Auditor
    role: "Read-only agent that independently verifies all modified and created files against CQ1-CQ22. Catches N/A abuse and rubber-stamped gates in the lead's self-evaluation."

