meta:
  slug: release-docs
  title: "release-docs — Diff-driven Documentation Sync After Release"
  description: "Sync docs after a release using git diff. Updates only docs whose source changed across 12 file types. Detects doc debt. --dry-run supported."
  category: release
  og_image: /og/skills/release-docs.png

seo:
  target_queries:
    - "auto-sync documentation after release git diff"
    - "update only changed docs after release changelog automation"
    - "diff-driven documentation update CI pipeline"
    - "documentation debt detection after code changes"
    - "release documentation automation Claude Code"
  canonical: /en/skills/release-docs

stats:
  - label: Phases
    value: "5"
    detail: "Range → Diff → Changelog → Doc Updates → Debt Detection"
  - label: Source File Types
    value: "12"
    detail: ".ts, .tsx, .js, .jsx, .py, .php, .go, .rs, .java, .rb, .swift, .kt"
  - label: Output Formats
    value: "3"
