modes:
  - name: pr-flow
    description: "Activated when last-ship.json records flow=pr. Runs pre-merge checks, merges the PR, then continues to CI wait and deploy."
  - name: direct-flow
    description: "Activated when last-ship.json records flow=direct. Skips merge phases; reads the merge commit from the current branch HEAD and proceeds to CI wait."

