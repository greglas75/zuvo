problem: |
  Audit skills generate dozens of findings per run. Without a persistent store,
  findings are reviewed once and forgotten — the same issues surface in the next
  audit cycle with no record of what was decided or why. zuvo:backlog is the
  persistence layer for the entire zuvo skill ecosystem: audit skills write
  findings to it automatically, developers mark items resolved or wontfix,
  and the `prioritize` and `suggest` commands turn accumulated debt into an
  actionable batch-fix plan. It keeps decision history intact, deduplicates
  re-discovered issues, and routes each item to the right remediation skill.

how_it_works:
  - step: "Auto-populated by Audit Skills"
    description: "Skills like zuvo:code-audit, zuvo:test-audit, zuvo:review, and zuvo:seo-audit write HIGH+ findings to memory/backlog.md automatically when --persist-backlog is enabled. Each item gets a fingerprint to prevent duplicate entries."
  - step: "Add and Manage Items"
    description: "Developers add items manually using natural language: `zuvo:backlog add race condition in payout.service.ts`. The skill infers severity, category, and file path, then deduplicates against existing fingerprints."
  - step: "List and Filter"
    description: "View all OPEN items, filter by category (code/test/arch/dep/doc/infra), or show all including RESOLVED and WONTFIX history."
  - step: "Prioritize"
    description: "Scores each OPEN item using (Impact + Risk) × (6 − Effort). With CodeSift available, blast radius is calculated from reference counts, improving Impact and Risk scores."
  - step: "Suggest Batch Actions"
    description: "Groups items by pattern — 3+ items with the same CQ gate failure, 3+ test anti-patterns, or a hotspot module — and proposes the right remediation skill command."

output:
  artifact: "memory/backlog.md"
  format: "Markdown table in memory/backlog.md. All operations modify this file in place. Status changes (fix, wontfix) preserve history; delete removes rows."
  sections:
    - "Open items table (ID, Severity, File, Problem, Seen)"
    - "Stats view (counts by severity and category)"
    - "Prioritized ranking with scores"
    - "Batch fix suggestions"

