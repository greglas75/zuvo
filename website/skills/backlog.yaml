faq:
  - q: "What does zuvo:backlog do?"
    a: "It maintains a persistent Markdown table at memory/backlog.md that tracks technical debt items across the project. Items can be added manually or written automatically by audit skills. The backlog supports 8 operations: add, list, fix, wontfix, delete, stats, prioritize, and suggest."
  - q: "How is backlog different from a GitHub Issues list?"
    a: "GitHub Issues track product bugs and features. zuvo:backlog tracks technical debt specifically — CQ gate failures, test anti-patterns, architectural concerns — with severity, category, fingerprints for deduplication, and a prioritization formula tuned to engineering risk. It lives in the repo alongside the code and is written to directly by audit skills without requiring a GitHub connection."
  - q: "How long does a backlog operation take?"
    a: "Most operations (list, add, fix, wontfix, stats) complete instantly — they read or write a single Markdown file. The `prioritize` command takes longer when CodeSift is available because it counts symbol references to calculate blast radius. The `suggest` command may scan for undiscovered TODO/FIXME markers across the codebase."
  - q: "Does backlog auto-fix anything?"
    a: "No — backlog tracks and prioritizes debt but never modifies source code. The `suggest` output proposes the right remediation command (e.g., `zuvo:fix-tests --pattern P-41 src/`) but does not run it. This keeps the tracking layer separate from the execution layer."
  - q: "How does deduplication work?"
    a: "Each item has a fingerprint in the format file|rule_id|signature. When an audit skill re-discovers the same issue, it increments the Seen counter rather than creating a duplicate row. Manual adds use the format file|manual|first-3-words-slugified. Fingerprints are case-insensitive and strip leading ./ from paths."

arguments:
  - flag: "(empty) or list"
    description: "Show all OPEN items as a summary table"
  - flag: "list category:[x]"
    description: "Filter OPEN items by category: code, test, arch, dep, doc, or infra"
  - flag: "list all"
    description: "Show all items including RESOLVED and WONTFIX"
  - flag: "add [description]"
    description: "Parse natural language description, infer severity/category, and append to backlog"
  - flag: "fix B-{N}"
    description: "Mark item as RESOLVED (preserves row for history)"
  - flag: "wontfix B-{N} [reason]"
    description: "Mark item as WONTFIX and append reason to Problem column"
  - flag: "delete B-{N}"
    description: "Remove item after confirmation (--force skips prompt)"
  - flag: "delete all-resolved"
    description: "Remove all RESOLVED and WONTFIX items after confirmation"
  - flag: "stats"
    description: "Show item counts by severity, category, and top files"
  - flag: "prioritize"
    description: "Score and rank all OPEN items using (Impact + Risk) × (6 − Effort)"
  - flag: "suggest"
    description: "Group items by pattern and propose batch fix commands"

