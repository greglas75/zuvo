faq:
  - q: "What does zuvo:seo-fix apply automatically?"
    a: "SAFE fixes are auto-applied: llms.txt creation, security headers (_headers or vercel.json), font-display: swap, lang attribute on <html>, alt text on decorative images, and viewport meta tag. These carry zero structural risk. MODERATE and DANGEROUS fixes require --auto or --all flags respectively."
  - q: "How is zuvo:seo-fix different from zuvo:seo-audit?"
    a: "zuvo:seo-audit scans your codebase and produces a JSON findings file with issue descriptions and scores. zuvo:seo-fix reads that JSON and applies the fixes — it does not discover issues. The intended workflow is audit first, then fix. If the audit JSON is older than 24 hours, seo-fix warns and recommends re-running the audit."
  - q: "What are the 3 safety tiers in zuvo:seo-fix?"
    a: "SAFE: structural changes only (new files, attribute additions) — auto-applied with no confirmation. MODERATE: changes that require validation (sitemap integration needs a site URL, OG image must be an absolute URL, robots.txt must not block Googlebot after the fix) — applied with automated checks. DANGEROUS: canonical URL configuration — applied only with --all flag plus explicit user confirmation per finding, because wrong canonical URLs can deindex pages."
  - q: "Which frameworks does zuvo:seo-fix support?"
    a: "Astro, Next.js, and Hugo have full template coverage for all applicable fix types. Universal (*) templates cover llms.txt, font-display, lang attribute, alt text, and viewport across any framework. WordPress and React SPAs without SSR are explicitly out of scope — seo-fix warns and skips those fix types."
  - q: "Does zuvo:seo-fix verify the build after applying fixes?"
    a: "Yes — if a build tool is detected (astro build, next build, hugo), a full build runs after each fix batch. A build failure triggers a revert of the last applied fix. This is Gate 2 and is non-negotiable. MODERATE fixes also include framework-specific validation (e.g., Googlebot access check on robots.txt rewrites)."

