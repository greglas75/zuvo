    description: "Read latest seo-audit JSON, apply SAFE fixes only, report MODERATE and DANGEROUS"
  - flag: "--auto"
    description: "Apply SAFE and MODERATE fixes automatically (DANGEROUS still reported only)"
  - flag: "--all"
    description: "Apply all tiers including DANGEROUS — requires explicit user confirmation per dangerous fix"
  - flag: "--dry-run"
    description: "Show what would be fixed at each tier without modifying any file"
  - flag: "--finding D4-sitemap-exists,F3"
    description: "Apply only the specified stable finding IDs (preferred) or display IDs"
  - flag: "--fix-type sitemap-add,json-ld-add,schema-cleanup"
    description: "Apply only fixes of the specified fix_type categories"
  - flag: "[json-path]"
    description: "Use a specific audit JSON file instead of the latest in audit-results/"

