faq:
  - q: "What does zuvo:seo-fix apply automatically?"
    a: "SAFE fixes are auto-applied: llms.txt creation, optional llms-full.txt companion generation when repo content exists, security headers (_headers or vercel.json), font-display: swap, lang attribute on <html>, alt text on decorative images, and viewport meta tag. MODERATE fixes such as sitemap-add, json-ld-add, schema-cleanup, meta-og-add, and robots-fix require --auto and still may downgrade to NEEDS_REVIEW if validation discovers risk."
  - q: "How is zuvo:seo-fix different from zuvo:seo-audit?"
    a: "zuvo:seo-audit scans your codebase and produces a JSON findings file with issue descriptions and scores. zuvo:seo-fix reads that JSON and applies the fixes — it does not discover issues. The intended workflow is audit first, then fix. If the audit JSON is older than 24 hours, seo-fix warns and recommends re-running the audit."
  - q: "What are the 3 safety tiers in zuvo:seo-fix?"
    a: "SAFE: structural changes only (new files, additive metadata, headers) — auto-applied with no confirmation. MODERATE: changes that require validation (sitemap integration needs a site URL, JSON-LD may require schema-cleanup first, OG image must be absolute, robots.txt must not block Googlebot and may still be overridden by Cloudflare) — applied with automated checks. DANGEROUS: canonical URL configuration — applied only with --all flag plus explicit user confirmation per finding."
  - q: "Which frameworks does zuvo:seo-fix support?"
    a: "Astro, Next.js, and Hugo have full template coverage for all applicable fix types. Universal (*) templates cover llms.txt, font-display, lang attribute, alt text, and viewport across any framework. WordPress and React SPAs without SSR are explicitly out of scope — seo-fix warns and skips those fix types."
  - q: "Does zuvo:seo-fix verify the build after applying fixes?"
    a: "Yes — if a build tool is detected (astro build, next build, hugo), a full build runs after each fix batch and the real exit code must be 0 before the run can be marked PASS. For generated public files such as llms.txt, llms-full.txt, or sitemap.xml, seo-fix also checks the built artifact or local preview response; a 404 or missing output downgrades the finding instead of reporting VERIFIED. The report also records estimated_time, manual_checks, policy_notes, advisory_scaffolds, risk_notes, and network_override_risk when verification cannot prove a file-level fix is enough."

arguments:
