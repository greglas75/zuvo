problem: |
  Running `zuvo:seo-audit` produces a findings report — but applying those fixes safely is
  still manual, error-prone, and time-consuming. `zuvo:seo-fix` reads the audit JSON and
  applies the fixes that are safe to automate (SAFE and optionally MODERATE), generates
  exact diffs for DANGEROUS changes (canonical rewrites) that require human sign-off, and
  runs a build verification after each batch to catch regressions. `VERIFIED` means more
  than "the logs looked good": the build must exit `0`, and generated public artifacts such
  as `/llms-full.txt` must exist after build (or respond successfully in local preview)
  before the skill can claim success. It also knows when not to over-claim success: schema
  spam can reroute to `schema-cleanup`, and Cloudflare or other edge controls can downgrade
  a seemingly valid `robots.txt` patch to `NEEDS_REVIEW`.

how_it_works:
  - step: Load Findings
    description: "Finds the latest seo-audit JSON in audit-results/, warns if it is older than 24 hours, and prints a tiered summary: SAFE / MODERATE / DANGEROUS plus review-only and insufficient-data counts."
  - step: Detect Framework and Targets
    description: "Reuses seo-audit stack detection. Maps each finding's fix_type to a framework-specific template from the shared registry (for example sitemap-add, robots-fix, meta-og-add, or schema-cleanup) and carries registry ETA + manual verification hints into the report."
  - step: Apply Fixes
    description: "Applies fixes in tier order: SAFE (auto-applied), MODERATE (applied with validation — robots.txt bot policy, JSON-LD/schema-cleanup anti-spam checks, OG image absolute URL, og:type normalization, sitemap lastmod review), DANGEROUS (generates diff + risk explanation only, unless --all)."
  - step: Verify
    description: "If a build tool is detected (astro build, next build, hugo), runs a full build after fixes and records the real exit code. Non-zero exit means FAIL even if logs look optimistic. For generated public files/endpoints such as /llms.txt, /llms-full.txt, and sitemap.xml, it also checks the built artifact or local preview response before reporting VERIFIED. A failed post-build check triggers per-finding rollback or NEEDS_REVIEW, not a blind full revert."
  - step: Report and Update Backlog
    description: "Prints the SEO FIX REPORT with per-finding verdicts, estimated before/after score, estimated_time, manual_checks, policy_notes, risk_notes, network_override_risk, and advisory_scaffolds for out-of-scope writing tasks. Updates memory/backlog.md accordingly."

output:
  artifact: "audit-results/seo-fix-YYYY-MM-DD.md and audit-results/seo-fix-YYYY-MM-DD.json"
  format: "SEO FIX REPORT block plus JSON v1.1 with per-finding status, estimated score improvement, eta_minutes, estimated_time, manual_checks, policy_notes, advisory_scaffolds, risk_notes, network_override_risk, and next steps. VERIFIED requires a passing build exit code when a build exists, plus any required artifact/endpoint check for generated public files."
  sections:
    - "Findings summary (total / fixed / needs review / manual / out of scope / no template / insufficient data)"
    - "Estimated score (before → after)"
    - "Estimated effort rubric"
    - "FIXED (auto-applied) — file and line reference"
    - "FIXED (validated) — validation outcome"
    - "NEEDS_REVIEW — warning explanation"
    - "MANUAL — exact diff and risk explanation"
    - "OUT_OF_SCOPE / NO_TEMPLATE / INSUFFICIENT_DATA"
    - "Advisory content scaffold"
    - "Next steps"

examples:
  - title: "Apply SAFE fixes from latest audit"
    type: invocation
    command: "zuvo:seo-fix"
    result: |
      SEO FIX REPORT -- zuvo.dev
      ----
      Findings: 13 total | 5 fixed | 2 needs review | 1 manual | 2 out of scope | 1 no template | 2 insufficient data
      Score:    53 -> 72 (estimated, re-audit for exact)
      ----
      FIXED (auto-applied):
        F2: Added llms.txt + llms-full.txt     public/llms.txt + public/llms-full.txt (new)  [VERIFIED] ~10 min
        F5: Added security headers             public/_headers (new)       [VERIFIED] ~15 min
        F8: Added font-display: swap           src/styles/global.css:14    [VERIFIED] ~5 min
        F9: Added viewport meta tag            src/layouts/Layout.astro:7  [VERIFIED] ~5 min

  - title: "Apply SAFE and MODERATE fixes"
    type: invocation
    command: "zuvo:seo-fix --auto"
    result: "Applies all SAFE fixes plus MODERATE fixes (sitemap integration, JSON-LD, schema-cleanup, OG tags, robots.txt) with validation. DANGEROUS fixes (canonical) still reported only, and Cloudflare/network uncertainty can still force NEEDS_REVIEW."

  - title: "Dry run to preview all tiers"
    type: invocation
    command: "zuvo:seo-fix --dry-run"
    result: "Shows every fix that would be applied at each tier with target files and expected changes — without modifying any file."

  - title: "Apply a specific dangerous fix with confirmation"
    type: invocation
    command: "zuvo:seo-fix --finding D11-canonical-present --all"
    result: "Targets the canonical-fix finding, shows the exact diff and risk, and requires explicit user confirmation before applying."

when_to_use: |
  Run `zuvo:seo-fix` after `zuvo:seo-audit` produces findings. It is the fix-application
  complement to the audit: seo-audit identifies what is broken, seo-fix applies the fixes
  that are safe to automate. Use default mode for the first pass (SAFE only), then
  `--auto` for MODERATE fixes after reviewing the SAFE results. Reach for it
  especially when you need deterministic patches for sitemap, robots, OG tags,
  JSON-LD, or schema cleanup without losing review hooks.

when_not_to_use: |
  Do not use `zuvo:seo-fix` as a substitute for `zuvo:seo-audit` — it requires an audit JSON
  to exist and warns if it is older than 24 hours. For discovering SEO issues (audit findings
  vs apply fixes), run `zuvo:seo-audit` first. seo-fix does not handle content writing, image
  generation, WordPress plugin configuration, React SPA SEO, redirects, or noindex management.

