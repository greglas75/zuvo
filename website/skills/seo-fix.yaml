problem: |
  Running `zuvo:seo-audit` produces a findings report — but applying those fixes safely is
  still manual, error-prone, and time-consuming. `zuvo:seo-fix` reads the audit JSON and
  applies the fixes that are safe to automate (SAFE and optionally MODERATE), generates
  exact diffs for DANGEROUS changes (canonical rewrites) that require human sign-off, and
  runs a build verification after each batch to catch regressions. It tells you the estimated
  score improvement before you commit to a re-audit.

how_it_works:
  - step: Load Findings
    description: "Finds the latest seo-audit JSON in audit-results/, warns if it is older than 24 hours, and prints a tiered summary: SAFE / MODERATE / DANGEROUS / SKIP / INSUFFICIENT DATA counts."
  - step: Detect Framework and Targets
    description: "Reuses seo-audit stack detection. Maps each finding's fix_type to a framework-specific template (e.g., sitemap-add for Astro installs @astrojs/sitemap; for Next.js creates app/sitemap.ts). Classifies each fix by safety tier."
  - step: Apply Fixes
    description: "Applies fixes in tier order: SAFE (auto-applied), MODERATE (applied with validation — robots.txt Googlebot check, JSON-LD schema.org fields, OG image absolute URL), DANGEROUS (generates diff + risk explanation only, unless --all). Build verification runs after each batch."
  - step: Verify
    description: "If a build tool is detected (astro build, next build, hugo), runs a full build after fixes. A build failure triggers a revert of the last fix. Re-runs critical gate checks (CG1-CG6) on modified files."
  - step: Report and Update Backlog
    description: "Prints the SEO FIX REPORT with per-finding verdicts, estimated before/after score, and next steps. Updates memory/backlog.md: removes FIXED items, increments NEEDS_REVIEW seen count, adds MANUAL and SKIP items."

output:
  artifact: "audit-results/seo-fix-YYYY-MM-DD.md and audit-results/seo-fix-YYYY-MM-DD.json"
  format: SEO FIX REPORT block with per-finding status (FIXED/NEEDS_REVIEW/MANUAL/SKIPPED), estimated score improvement, and next steps.
  sections:
    - "Findings summary (total / fixed / needs review / manual / skipped)"
    - "Estimated score (before → after)"
    - "FIXED (auto-applied) — file and line reference"
    - "FIXED (validated) — validation outcome"
    - "NEEDS_REVIEW — warning explanation"
    - "MANUAL — exact diff and risk explanation"
    - "SKIPPED — reason (no template or INSUFFICIENT DATA)"
    - "Next steps"

examples:
  - title: "Apply SAFE fixes from latest audit"
    type: invocation
    command: "zuvo:seo-fix"
    result: |
      SEO FIX REPORT -- zuvo.dev
      ----
      Findings: 13 total | 5 fixed | 2 needs review | 2 manual | 4 skipped
      Score:    53 -> 72 (estimated, re-audit for exact)
      ----
      FIXED (auto-applied):
        F2: Added llms.txt                     public/llms.txt (new)
        F5: Added security headers             public/_headers (new)
        F8: Added font-display: swap           src/styles/global.css:14
        F9: Added lang="en" to <html>          src/layouts/Layout.astro:1
        F11: Added viewport meta tag           src/layouts/Layout.astro:7

  - title: "Apply SAFE and MODERATE fixes"
    type: invocation
    command: "zuvo:seo-fix --auto"
    result: "Applies all SAFE fixes plus MODERATE fixes (sitemap integration, JSON-LD, OG tags, robots.txt) with validation. DANGEROUS fixes (canonical) still reported only."

  - title: "Dry run to preview all tiers"
    type: invocation
    command: "zuvo:seo-fix --dry-run"
    result: "Shows every fix that would be applied at each tier with target files and expected changes — without modifying any file."

  - title: "Apply a specific dangerous fix with confirmation"
    type: invocation
    command: "zuvo:seo-fix --finding F7 --all"
    result: "Targets finding F7 (canonical-fix, DANGEROUS), shows the exact diff and risk, and requires explicit user confirmation before applying."

when_to_use: |
  Run `zuvo:seo-fix` after `zuvo:seo-audit` produces findings. It is the fix-application
  complement to the audit: seo-audit identifies what is broken, seo-fix applies the fixes
  that are safe to automate. Use default mode for the first pass (SAFE only), then
  `--auto` for MODERATE fixes after reviewing the SAFE results.

when_not_to_use: |
  Do not use `zuvo:seo-fix` as a substitute for `zuvo:seo-audit` — it requires an audit JSON
  to exist and warns if it is older than 24 hours. For discovering SEO issues (audit findings
  vs apply fixes), run `zuvo:seo-audit` first. seo-fix does not handle content writing, image
  generation, WordPress plugin configuration, React SPA SEO, redirects, or noindex management.

