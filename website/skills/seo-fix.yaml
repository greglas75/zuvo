  - flag: "--all"
    description: "Apply all tiers including DANGEROUS — requires explicit user confirmation per dangerous fix"
  - flag: "--dry-run"
    description: "Show what would be fixed at each tier without modifying any file"
  - flag: "--finding F1,F3"
    description: "Apply only the specified finding IDs by number"
  - flag: "--category sitemap,json-ld"
    description: "Apply only fixes of the specified fix_type categories"
  - flag: "[json-path]"
    description: "Use a specific audit JSON file instead of the latest in audit-results/"

