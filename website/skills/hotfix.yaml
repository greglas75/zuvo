  rows:
    - ["Branch management", "Ad-hoc or forgotten", "Auto-created hotfix/YYYY-MM-DD-slug from correct base"]
    - ["Scope control", "None — fix sprawls under pressure", "Hard limit: 1-3 production files with scope guard"]
    - ["Regression test", "Skipped under time pressure", "Mandatory — recreates exact bug condition"]
    - ["Safety checks", "None or informal", "5 critical CQ gates with file:function:line evidence"]
    - ["Test execution", "Skipped or partial", "Full suite by default, affected-only with --no-test"]
    - ["Deployment path", "Manual git commands", "Offers cherry-pick, PR, or push with optional --deploy chain"]
    - ["Audit trail", "Commit message only", "Run log + project journal + session memory update"]
