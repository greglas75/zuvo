faq:
  - q: "What does zuvo:build check during implementation?"
    a: "After writing each production file, build runs CQ1-CQ22 self-evaluation with evidence for every critical gate. After writing tests, it runs Q1-Q17 self-evaluation. Then two independent agents run in parallel: a CQ Auditor reads the full production files and a Test Quality Auditor reads the full test files. FIX-NOW items are applied before commit; DEFER items go to the backlog."
  - q: "How is zuvo:build different from the brainstorm/plan/execute pipeline?"
    a: "zuvo:build is a self-contained 5-phase workflow for features affecting 1-5 files where the approach is already clear. The full pipeline (brainstorm → plan → execute) is for larger features requiring upfront design exploration, architecture analysis, and a formal spec document. Build skips spec production and operates directly from your feature description."
  - q: "How long does a zuvo:build session take?"
    a: "The two parallel Phase 1 analysis agents run in the background while the plan is being written, adding minimal latency. Total time depends on feature complexity: a small 2-3 file feature typically takes 5-10 minutes; a 5-file feature with complex logic takes 15-25 minutes. Both independent audit agents in Phase 4 run in parallel."
  - q: "Can zuvo:build auto-approve the plan and commit?"
    a: "Yes — pass --auto to skip Phase 2 plan approval and --auto-commit to skip Phase 5 commit confirmation. Both can be combined. All analysis agents and quality gates run regardless of these flags — they only skip the interactive confirmation steps, not the quality enforcement."
  - q: "What frameworks does zuvo:build support?"
    a: "zuvo:build detects the stack from config files and loads the matching rules. Supported: TypeScript, JavaScript, Python, React/Next.js, NestJS, PHP. The quality gate criteria (CQ1-CQ22, Q1-Q17) are language-independent; the generated code, verification commands, and test patterns are stack-specific."

arguments:
  - flag: "<feature description>"
    description: "What to build, passed as free text, e.g., zuvo:build add CSV export for order history."
  - flag: "--auto"
    description: "Skip user approval of the implementation plan in Phase 2. All agents and quality gates still run."
  - flag: "--auto-commit"
    description: "Commit staged changes without asking for confirmation in Phase 5. Can be combined with --auto."

checks:
  sections:
    - name: "Production Code Quality"
      id_range: "CQ1-CQ22"
      count: 22
      items:
        - id: CQ3
          name: "Input validation at entry points"
          critical: true
        - id: CQ4
          name: "Auth guard paired with query filter"
          critical: true
        - id: CQ5
          name: "No PII in logs or error messages"
          critical: true
        - id: CQ6
          name: "User-provided limits capped with Math.min"
          critical: true
        - id: CQ8
          name: "Infrastructure errors handled with timeout/fallback"
          critical: true
        - id: CQ14
          name: "No duplicated logic blocks"
          critical: true
        - id: CQ16
          name: "Money calculations use integer-cents arithmetic"
          critical: false
        - id: CQ19
          name: "API responses do not leak internal fields"
          critical: false
    - name: "Test Code Quality"
      id_range: "Q1-Q17"
      count: 17
      items:
        - id: Q7
          name: "Error paths have dedicated tests"
          critical: true
        - id: Q11
          name: "All branches exercised"
          critical: true
        - id: Q13
          name: "Tests import real production code"
          critical: true
        - id: Q15
          name: "Assertions verify values, not just shape"
          critical: true
        - id: Q17
          name: "Expected values from spec, not copied from implementation"
          critical: true

frameworks:
  - TypeScript
  - JavaScript
  - Python
  - React / Next.js
  - NestJS
  - PHP

modes:
  - name: "--auto"
    description: "Skip plan approval gate in Phase 2. Quality gates and audit agents run regardless."
  - name: "--auto-commit"
    description: "Skip commit confirmation in Phase 5. Can be combined with --auto."

agents:
  - name: Blast Radius Mapper
    role: "Traces all importers and callers of target files, flags widely-imported modules (5+ importers), and identifies test coverage gaps. Runs on Sonnet in Phase 1 (parallel)."
  - name: Existing Code Scanner
    role: "Searches for overlapping services, helpers, and patterns that would be duplicated by the planned feature. Runs on Haiku in Phase 1 (parallel)."
  - name: Test Quality Auditor
    role: "Read-only agent that independently verifies test files against Q1-Q17 gates in Phase 4 (parallel with CQ Auditor)."
  - name: CQ Auditor
    role: "Read-only agent that independently verifies full production files against CQ1-CQ22 gates in Phase 4 (parallel with Test Quality Auditor)."

benchmarks:
  - claim: "2 analysis agents run in parallel in the background while the plan is being written"
    type: speed
    verifiable: true
    source: "SKILL.md Phase 1 — both agents dispatched with run_in_background:true"
  - claim: "Files staged explicitly by name — git add -A is never used"
    type: accuracy
    verifiable: true
    source: "SKILL.md Phase 5.2 — git add [explicit file list — never -A or .]"
  - claim: "Build tag created after every commit for clean rollback to git revert HEAD"
    type: accuracy
    verifiable: true
    source: "SKILL.md Phase 5.3 — git tag build-[YYYY-MM-DD]-[short-slug]"

