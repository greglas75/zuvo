problem: |
  Adding a new feature without understanding its blast radius leads to broken callers, duplicated utility functions, and technical debt that compounds over time. Most developers skip the analysis phase under time pressure, only to spend twice as long debugging regressions. zuvo:build enforces a systematic approach: two parallel analysis agents map the impact and check for duplication before a plan is written, two independent audit agents verify quality after code is written, and all deferred findings are persisted to the backlog rather than silently dropped.

how_it_works:
  - step: "Phase 0: Project Context"
    description: "The skill reads AGENTS.md or CLAUDE.md for project conventions, detects the tech stack, loads the matching rules (TypeScript, NestJS, Python, etc.), and checks memory/backlog.md for open items related to the feature area."
  - step: "Phase 1: Parallel Analysis"
    description: "2 agents run simultaneously in the background: the Blast Radius Mapper traces all importers and callers of the target files, flags widely-imported modules (5+ importers) as high-risk, and identifies test coverage gaps. The Existing Code Scanner searches for overlapping services, helpers, and patterns to prevent building what already exists."
  - step: "Phase 2: Implementation Plan"
    description: "A plan is written incorporating agent results: Feature Summary, Scope Fence (exact allowed/forbidden files), Blast Radius from Agent 1, Duplication Check from Agent 2, Implementation Steps, Test Strategy, File Size Check, and Open Questions. You review and approve before Phase 3 starts (unless --auto flag is passed)."
  - step: "Phase 3: Implement + Self-Evaluate"
    description: "Code is written following the scope fence. After each production file, CQ1-CQ22 self-evaluation runs with evidence for every critical gate. Tests are written per the test strategy, followed by Q1-Q17 self-evaluation. Critical gate violations are fixed before writing tests."
  - step: "Phase 4: Independent Audit + Verify"
    description: "A CQ Auditor agent and Test Quality Auditor agent run in parallel, independently reviewing the full files (not just diffs). All test, type, and lint commands are run. FIX-NOW items are applied immediately; CRITICAL-BLOCKED items block commit; DEFER items go to the backlog."
  - step: "Phase 5: Backlog Persistence + Commit"
    description: "All deferred findings are persisted to memory/backlog.md with fingerprints and deduplication. Only the explicitly scoped files are staged (never git add -A). A build tag is created for clean rollback, and next-step suggestions are printed."

output:
  artifact: "Committed code + memory/backlog.md (updated)"
  format: "A BUILD COMPLETE summary with feature description, file counts, test results, verification status, CQ/Q scores, backlog items, commit hash, and tag name."
  sections:
    - "Files created and modified"
    - "Test results (all passing)"
    - "Verification (tests / types / lint)"
    - "CQ score across production files"
    - "Q score across test files"
    - "Backlog items persisted"
    - "Commit hash and tag"

examples:
  - title: "Blast Radius Report from Phase 1"
    type: output_sample
    sample:
      language: markdown
      code: |
        BLAST RADIUS REPORT
        Files analyzed: 2
        Direct dependents:
          src/controllers/order.controller.ts: OrderService.create
          src/modules/checkout/checkout.service.ts: OrderService.findByUser
          src/modules/checkout/checkout.service.spec.ts: (test coverage)
        Test coverage: order.service.ts ✓ (order.service.spec.ts), order-helpers.ts ✗ (no tests)
        High-risk items: order.service.ts (7 importers — widely imported)
        Recommendation: Add tests for order-helpers.ts before modifying. Be cautious with
                        OrderService public interface changes — 7 consumers.
    explanation: "The blast radius report surfaces hidden dependencies before any code is written. The test coverage gap for order-helpers.ts is flagged so the plan can include writing those tests first."

  - title: "Build with auto flags for CI/scripted use"
    type: invocation
    command: "zuvo:build add CSV export for order history --auto --auto-commit"
    result: |
      STACK: TypeScript/NestJS | RUNNER: vitest
      BACKLOG: none
      [Dispatching blast radius + duplication agents in parallel...]
      [Plan auto-approved — --auto flag]
      [Implementation complete — 3 files created, 2 modified]
      [CQ Auditor: PASS 21/22 | Test Auditor: PASS 16/17]
      [Auto-committing — --auto-commit flag]
      BUILD COMPLETE — commit: a3f92b1 — tag: build-2026-03-29-csv-export

  - title: "Critical gate failure blocks commit"
    type: before_after
    before:
      language: typescript
      code: |
        // CQ6 FAIL: user-provided limit passed uncapped
        async listOrders(userId: string, limit: number) {
          return this.db.order.findMany({ where: { userId }, take: limit });
        }
    after:
      language: typescript
      code: |
        // CQ6 PASS: limit capped with Math.min
        const MAX_PAGE_SIZE = 100;
        async listOrders(userId: string, limit = 20) {
          const take = Math.min(limit, MAX_PAGE_SIZE);
          return this.db.order.findMany({ where: { userId }, take });
        }
    gate: CQ6
    explanation: "CQ6 (user-provided limits uncapped) is a critical gate. The CQ Auditor flags it as CRITICAL-BLOCKED and the implementer fixes it before the commit is allowed."

when_to_use: |
  Use zuvo:build for concrete features affecting 1-5 files where the approach is already clear. It is the right tool when you want quality enforcement without the full brainstorm → plan → execute pipeline overhead. If you are touching more than 5 files or the correct design approach is unclear, start with zuvo:brainstorm instead.

when_not_to_use: |
  For bug investigation and fixes, use zuvo:debug — build is not designed for root cause analysis. For structural reorganization (extracting methods, splitting god classes, breaking circular dependencies), use zuvo:refactor. For features spanning more than 5 files or when the design needs exploration, use the zuvo:brainstorm → zuvo:plan → zuvo:execute pipeline. For code review without implementing new features, use zuvo:review.

