problem: |
  Database problems are invisible until they become incidents. An N+1 query that fetches 1 record in development fetches 10,000 in production. A service that opens a new database client per request exhausts the connection pool under load. A multi-table mutation without a transaction leaves the database in a partially written state when an error occurs mid-write. `zuvo:db-audit` reads your ORM code, schema, and migration files to find these patterns before they cause downtime — and maps each finding to the exact file and line.

how_it_works:
  - step: "Stack detection"
    description: "The skill auto-detects ORM (Prisma, TypeORM, Drizzle, Sequelize, Django, SQLAlchemy, raw SQL), database engine (PostgreSQL, MySQL, SQLite, MongoDB), and deployment type (Serverless, Container, Traditional) from config signals. Detection results are printed before analysis begins."
  - step: "Schema analysis"
    description: "The schema file (prisma/schema.prisma, models.py, entity files, etc.) is inventoried: model count, fields per model, relations, indexes, unique constraints, nullable fields, and enum vs string usage. Migration files are scanned for unsafe DDL operations (blocking index creation, type changes on populated columns)."
  - step: "Code-level analysis (DB1-DB12)"
    description: "Three parallel agents cover the 12 dimensions: Schema Analyst (DB2, DB3, DB6), Query Scanner (DB1, DB5, DB8, DB9), and Infrastructure Auditor (DB4, DB7, DB10, DB11, DB12). Each agent checks ORM-specific anti-patterns for the detected ORM."
  - step: "Cross-dimension correlation"
    description: "Compound patterns are flagged: N+1 on an unindexed column (DB1+DB2), unbounded query without cache on a large table (DB1+DB7+DB11), external API call inside a transaction without timeout (DB5+DB4), serverless deployment without external pooler and multiple client instances (DB4+deployment)."
  - step: "Live analysis (optional)"
    description: "When --live <conn> is provided, the skill executes read-only EXPLAIN and pg_stat_statements queries to surface actual slow queries, unused indexes by idx_scan=0, cache hit ratio, and table bloat. Live mode is strictly opt-in and read-only."

output:
  artifact: "audits/db-audit-YYYY-MM-DD.md"
  format: "Markdown report with dimension score table, critical gate status, model inventory, severity-sorted findings, cross-cutting compound patterns, and top 5 action items."
  sections:
    - "Metadata (ORM, engine, deployment, scope)"
    - "Executive Summary (weighted score, grade, finding counts)"
    - "Dimension Scores (DB1-DB12 with max per dimension)"
    - "Critical Gate Status"
    - "Model Inventory"
    - "Findings (sorted by CRITICAL → HIGH → MEDIUM → LOW)"
    - "Cross-Cutting Patterns"
    - "Top 5 Action Items"
    - "Backlog Entries"

examples:
  - title: "Full project audit"
    type: invocation
    command: "zuvo:db-audit full"
    result: "Runs all 12 dimensions: schema analysis, code-level checks for the detected ORM, and cross-dimension correlation. Produces scored report with model inventory."
  - title: "Query pattern check only"
    type: invocation
    command: "zuvo:db-audit --queries"
    result: "Runs DB1 (query patterns), DB8 (query optimization), and DB9 (ORM anti-patterns) only. Fast scope for checking a new feature before merge."
  - title: "N+1 query pattern detected (DB1 critical gate)"
    type: before_after
    gate: "DB1"
    before:
      language: typescript
      code: |
        async function getOrdersWithItems(orgId: string) {
          const orders = await prisma.order.findMany({ where: { orgId } });
          for (const order of orders) {
            order.items = await prisma.orderItem.findMany({
              where: { orderId: order.id },
            });
          }
          return orders;
        }
    after:
      language: typescript
      code: |
        async function getOrdersWithItems(orgId: string) {
          return prisma.order.findMany({
            where: { orgId },
            include: { items: true },
          });
        }
    explanation: "DB1 N+1 is a critical gate. The before version issues 1 + N queries (one findMany plus one per order). Prisma's include collapses this to 2 queries via a JOIN. The audit flags the loop at file:line and suggests the include pattern."
  - title: "Live analysis: unused indexes"
    type: invocation
    command: "zuvo:db-audit --live postgres://readonly@db:5432/prod"
    result: "Queries pg_stat_user_indexes for idx_scan=0 entries, pg_stat_statements for the top 20 slowest queries, and reports cache hit ratio. All queries are read-only SELECTs and EXPLAINs."

when_to_use: "Run `zuvo:db-audit` before a release, after adding new models or queries, when API latency increases unexpectedly, after a scaling incident, or as a periodic health check. Use --queries for a fast pre-merge check on a single service file."

when_not_to_use: "For general code quality issues in service files, use `zuvo:code-audit`. For full-stack performance analysis (bundles, rendering, API latency at the application layer), use `zuvo:performance-audit`. For SQL injection and security-only review with attack path analysis, use `zuvo:security-audit`."

