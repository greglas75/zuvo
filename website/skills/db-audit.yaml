faq:
  - q: "What does zuvo:db-audit check?"
    a: "It audits 12 dimensions: query patterns including N+1 and raw SQL safety (DB1), index strategy including missing FK indexes and composite coverage (DB2), schema design including normalization and enum usage (DB3), connection management and pooling (DB4), transaction safety for multi-table mutations (DB5), migration safety for non-blocking DDL (DB6), caching layer (DB7), query optimization including pagination and LIKE patterns (DB8), ORM-specific anti-patterns for the detected ORM (DB9), observability and slow query logging (DB10), data lifecycle and archival (DB11), and database security including SQL injection and least-privilege (DB12)."
  - q: "How is zuvo:db-audit different from zuvo:performance-audit?"
    a: "zuvo:db-audit focuses exclusively on the database layer: schema design, query patterns, connection management, transactions, migrations, and DB security. zuvo:performance-audit covers the full stack: bundle sizes, rendering, Web Vitals, API latency, memory usage, and backend runtime — with database query patterns as one of 12 dimensions. If your problem is specifically database-related, db-audit gives deeper coverage."
  - q: "What ORMs are supported?"
    a: "Prisma, TypeORM, Drizzle, Sequelize, Knex, Django ORM, SQLAlchemy, and raw SQL clients (pg, mysql2). ORM-specific anti-patterns in DB9 are tailored to the detected ORM — Prisma checks for $queryRawUnsafe and missing select on deep includes, Django checks for missing select_related/prefetch_related, SQLAlchemy checks for missing yield_per on large result sets."
  - q: "Is the audit safe to run on a production database?"
    a: "The code-level audit (Phases 1-2) requires no database connection at all — it reads source files only. Live mode (--live) is strictly opt-in and executes only SELECT and EXPLAIN queries. No INSERT, UPDATE, DELETE, CREATE, ALTER, or DROP statements are ever issued. A read-only database user is recommended."
  - q: "What are the 4 critical gates?"
    a: "DB1 (N+1 query in a hot code path), DB4 (no connection pooling — new client per request), DB5 (multi-table mutations without a wrapping transaction), and DB12 (SQL injection via string concatenation or $queryRawUnsafe). Any critical gate scoring 0 overrides the overall grade to FAIL regardless of the total weighted score."

arguments:
  - flag: "(empty) or full"
    description: "Audit all 12 dimensions across the project (default)"
  - flag: "[path]"
    description: "Scope audit to a specific directory or module"
  - flag: "[file]"
    description: "Deep audit of a single file (all applicable dimensions)"
  - flag: "--schema"
    description: "Schema analysis only: DB2 (indexes), DB3 (schema design), DB6 (migration safety)"
  - flag: "--queries"
    description: "Query pattern analysis only: DB1 (patterns), DB8 (optimization), DB9 (ORM anti-patterns)"
  - flag: "--connections"
    description: "Connection and pool management only: DB4"
  - flag: "--live <conn>"
    description: "Enable Phase 3: connect to the database with a read-only connection string for EXPLAIN and pg_stat_statements analysis"

checks:
  sections:
    - name: "Database Dimensions"
      id_range: "DB1-DB12"
      count: 12
      items:
        - id: "DB1"
          name: "Query patterns — N+1, SELECT *, bulk operations, raw SQL parameterization"
          critical: true
        - id: "DB4"
          name: "Connection management — pooling configured, singleton client, serverless pooler"
          critical: true
        - id: "DB5"
          name: "Transaction safety — multi-table mutations wrapped, no external API calls inside transaction"
          critical: true
        - id: "DB12"
          name: "Database security — SQL injection, least privilege, SSL/TLS, PII encryption"
          critical: true
        - id: "DB2"
          name: "Index strategy — FK indexes, composite indexes for query patterns, unused indexes"
          critical: false
        - id: "DB3"
          name: "Schema design — normalization, enum usage, timestamps, naming conventions"
          critical: false
        - id: "DB6"
          name: "Migration safety — CONCURRENTLY for index creation, reversibility, type changes"
          critical: false
        - id: "DB9"
          name: "ORM-specific anti-patterns tailored to detected ORM"
          critical: false

