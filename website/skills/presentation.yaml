faq:
  - q: "What does zuvo:presentation generate?"
    a: "It generates a PPTX file using python-pptx plus a scripts/generate_presentation.py script. The script embeds your content and theme constants so you can re-run it to regenerate slides after edits, or modify it directly to customize layouts beyond what the skill generates."
  - q: "How is zuvo:presentation different from pasting content into Google Slides?"
    a: "zuvo:presentation applies consistent typography rules (6 slide types with defined font sizes), enforces content quality rules (max 6 bullets, max 15 words per bullet, visual variety), and generates speaker notes automatically. The Python script is a reproducible artifact — change the theme or content and re-run in seconds."
  - q: "How long does zuvo:presentation take to generate a 10-slide deck?"
    a: "Content planning and script generation take under 30 seconds. Script execution via python-pptx is typically under 5 seconds. Total time from command to PPTX file is usually under 1 minute, not counting outline review time in interactive mode."
  - q: "Can zuvo:presentation generate slides in languages other than English?"
    a: "Yes — use --lang [code] to set the content language. The skill matches the language of the topic input by default, so passing a Polish topic generates Polish slides without the flag. All text content, bullets, and speaker notes will be in the specified language."
  - q: "What Python dependency is required?"
    a: "python-pptx is the only required dependency. Install with pip install python-pptx. If it is not installed, the skill prints the install command and stops before generating any files."

arguments:
  - flag: "[topic]"
    description: "Topic string to plan an outline from scratch and generate slides."
  - flag: "from [file]"
    description: "Build slides from an existing markdown or text file."
  - flag: "--slides N"
    description: "Target slide count (default: 10)."
  - flag: "--theme dark|light|corporate"
    description: "Color theme for the deck (default: corporate)."
  - flag: "--out [path]"
    description: "Output PPTX file path (default: ./[topic-slug].pptx)."
  - flag: "--outline-only"
    description: "Generate and print the outline for approval without creating a PPTX file."
  - flag: "--lang [code]"
    description: "Content language code, e.g. pl, de, ja (default: matches topic input language)."

checks: null

frameworks:
  - python-pptx

modes:
  - name: "[topic]"
    description: "Plan outline from scratch using the topic string, then generate slides."
  - name: "from [file]"
    description: "Map markdown/text sections to slide types, then generate slides."
  - name: "--outline-only"
    description: "Planning preview mode — print outline and stop without generating PPTX."

