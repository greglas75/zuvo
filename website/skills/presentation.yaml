problem: |
  Building a slide deck manually is time-consuming even when the content is already written.
  Converting a documentation file or audit report into a presentation requires restructuring content
  into slide-sized chunks, applying consistent typography, choosing layouts, and writing speaker notes —
  work that is mechanical but still takes 30-60 minutes. `/presentation` automates the full pipeline:
  content planning, outline approval, theme application, and PPTX generation via python-pptx — all
  from a single command.

how_it_works:
  - step: "Argument Parsing"
    description: "Determines source (topic string or file path), target slide count, theme, output path, and language from the invocation arguments."
  - step: "Content Planning"
    description: "For a topic: generates a structured outline with typed slides (TITLE, CONTENT, METRICS, etc.), max 6 bullets per slide. For a file: maps markdown headings and lists to slide types."
  - step: "Outline Approval"
    description: "Prints the full outline for review. --outline-only stops here. Interactive mode asks Proceed/Edit/Cancel. Non-interactive mode proceeds automatically."
  - step: "Theme Configuration"
    description: "Applies selected color theme (light/dark/corporate) with typography constants: Calibri 36pt Bold for titles, 16pt for bullets, 48pt Bold for metrics, 24pt Italic for quotes."
  - step: "PPTX Generation"
    description: "Writes scripts/generate_presentation.py with theme constants, helper functions, and per-slide-type builder functions. Executes the script and verifies slide count."
  - step: "Output Summary"
    description: "Reports file path, slide count, theme, file size, and a slide-by-slide overview. The generated script is preserved for re-generation and manual editing."

output:
  artifact: "./[topic-slug].pptx (default) or --out [path]"
  format: "PPTX file plus scripts/generate_presentation.py for re-generation. Summary printed with slide overview and post-generation tips."
  sections:
    - "File path and size"
    - "Slide count and theme"
    - "Slide-by-slide overview (type + title)"
    - "Script location for re-generation"
    - "Post-generation tips (modify, add images, change theme)"

examples:
  - title: "Generate a Q1 review deck"
    type: invocation
    command: "zuvo:presentation \"Q1 2026 Product Review\" --theme corporate"
    result: |
      Planning outline from topic: "Q1 2026 Product Review"

      Outline (10 slides):
        1. TITLE       — Q1 2026 Product Review
        2. SECTION     — Highlights
        3. METRICS     — Key Numbers
        4. CONTENT     — Feature Releases
        5. TWO_COLUMN  — Goals vs Actuals
        6. SECTION     — Challenges
        7. CONTENT     — Issues and Mitigations
        8. TIMELINE    — Q2 Roadmap
        9. SUMMARY     — Key Takeaways
       10. CLOSING     — Questions & Next Steps

      Proceed? → y

      Generated: scripts/generate_presentation.py
      Executed successfully.

      PRESENTATION CREATED
      File:   ./q1-2026-product-review.pptx
      Slides: 10
      Theme:  corporate
      Size:   84 KB

  - title: "Build slides from an architecture doc with outline-only preview"
    type: invocation
    command: "zuvo:presentation from docs/architecture.md --slides 8 --outline-only"
    result: |
      Reading: docs/architecture.md (6 sections, 2 tables, 1 code block)

      Mapped outline (8 slides):
        1. TITLE       — System Architecture
        2. SECTION     — Overview
        3. CONTENT     — Core Components
        4. TWO_COLUMN  — Before / After (from table)
        5. CONTENT     — Data Flow
        6. CONTENT     — Security Model (code block as monospace note)
        7. METRICS     — Performance Targets
        8. SUMMARY     — Key Decisions

      --outline-only: stopping here. Run without --outline-only to generate PPTX.

  - title: "Dark theme deck in Polish"
    type: invocation
    command: "zuvo:presentation \"Wyniki Audytu Bezpieczenstwa\" --theme dark --lang pl --slides 12"
    result: |
      Language: Polish (pl)
      Theme: dark (#1A1A2E background, #4DA6FF accent)
      Target: 12 slides

      Generated: ./wyniki-audytu-bezpieczenstwa.pptx
      Slides: 12 | Size: 91 KB

when_to_use: |
  Use `/presentation` when you need to convert an audit report, architecture document, or topic summary
  into a slide deck. It fits naturally at the end of a `/security-audit`, `/performance-audit`, or
  `/architecture` workflow — take the output file and pass it with `from [file]` to generate stakeholder
  slides automatically.

when_not_to_use: |
  For editing an existing PPTX file, open it in PowerPoint directly — `/presentation` creates new files
  from scratch and does not parse existing PPTX. For complex data visualizations like charts or graphs,
  use the generated script as a starting point and add chart code manually with python-pptx's chart API.
  For rich web-based slide formats (Reveal.js, MDX Deck), use `/docs` instead.

