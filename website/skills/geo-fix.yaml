faq:
  - q: "What does zuvo:geo-fix apply automatically?"
    a: "SAFE fixes are auto-applied: robots-ai-allow (when no existing bot rules), canonical-add (when no existing canonical), llms-txt-generate, sitemap-robots-ref, and frontmatter-date-add. MODERATE fixes require --auto and include 3-layer validation: schema-org-add, schema-article-add, schema-faq-add, schema-id-link. DANGEROUS fixes (robots-ai-policy-change when existing rules are present, schema-restructure) require --all plus explicit user confirmation per finding."
  - q: "How does geo-fix handle seo-fix overlap?"
    a: "Before applying any fix, geo-fix scans seo-fix JSON output for already-applied fixes. If seo-fix already applied llms-txt-add, robots-fix, or canonical-fix to the same file, geo-fix marks those findings as ALREADY_APPLIED_BY_SEO_FIX and skips them. If seo-fix applied a fix but with NEEDS_REVIEW or FAILED status, geo-fix proceeds independently."
  - q: "What is a context-aware safety upgrade?"
    a: "Context-aware safety upgrades promote a fix to a stricter tier when the target file already has conflicting content. schema-org-add/schema-id-link upgrade from MODERATE to DANGEROUS if the target file already contains JSON-LD (to avoid breaking existing Rich Results). robots-ai-allow upgrades from SAFE to MODERATE if robots.txt already has bot rules (to avoid accidental policy changes)."
  - q: "What are advisory scaffolds and why do they not contain body content?"
    a: "Content findings like BLUF restructuring, heading rewriting, and E-E-A-T improvements require editorial judgment — geo-fix emits HTML comment placeholders (<!-- TODO: ... GEO signal: ... -->) instead. These scaffolds tell content authors where to write and why it matters for AI citation, without generating text that may be factually wrong or misleading. Adversarial review enforces this: any generated body content in a scaffold fails the review."
  - q: "Does geo-fix verify the build after applying fixes?"
    a: "Yes — if a build tool is detected (astro build, next build, hugo), a full build runs after each fix batch and the real exit code must be 0 before the run can be marked PASS. For generated public files such as llms.txt, robots.txt, and sitemap.xml, geo-fix also checks the built artifact exists and is non-empty; a 404 or missing output downgrades the finding to NEEDS_REVIEW rather than reporting VERIFIED."

arguments:
  - flag: "(default)"
    description: "Read latest geo-audit JSON, apply SAFE fixes only, report MODERATE and DANGEROUS"
  - flag: "--auto"
    description: "Apply SAFE and MODERATE fixes automatically (DANGEROUS still reported only)"
  - flag: "--all"
    description: "Apply all tiers including DANGEROUS — requires explicit user confirmation per dangerous fix"
  - flag: "--dry-run"
    description: "Show what would be fixed at each tier without modifying any file"
  - flag: "--finding G2-schema-id-disconnected,G3-llms-txt-missing"
    description: "Apply only the specified stable finding IDs"
  - flag: "--fix-type schema-org-add,robots-ai-allow"
    description: "Apply only fixes of the specified fix_type categories"
  - flag: "--skip-adversarial"
    description: "Skip cross-provider adversarial review of applied fixes"
  - flag: "[json-path]"
    description: "Use a specific audit JSON file instead of the latest in audit-results/"

checks:
  sections:
    - name: "SAFE Fixes (auto-applied)"
      id_range: "SAFE tier"
      count: 3
      items:
        - id: "robots-ai-allow"
          name: "Add retrieval bot allow rules to robots.txt (no existing rules)"
          critical: false
        - id: "llms-txt-generate"
          name: "Generate public/llms.txt from site structure"
          critical: false
        - id: "sitemap-robots-ref"
          name: "Add Sitemap: directive to robots.txt"
          critical: false
    - name: "MODERATE Fixes (with 3-layer validation)"
      id_range: "MODERATE tier"
      count: 5
      items:
        - id: "schema-org-add"
          name: "Add Organization JSON-LD with @id to layout head"
          critical: false
        - id: "schema-article-add"
          name: "Add Article JSON-LD with @id and dateModified to blog/post layout"
          critical: false
        - id: "schema-faq-add"
          name: "Add FAQPage JSON-LD with Q/A pairs"
          critical: false
        - id: "schema-id-link"
          name: "Add @id references to connect existing schema blocks"
          critical: false
        - id: "canonical-add"
          name: "Add rel=canonical to layout head (no existing canonical)"
          critical: true
    - name: "DANGEROUS Fixes (manual only)"
      id_range: "DANGEROUS tier"
      count: 2
      items:
        - id: "robots-ai-policy-change"
          name: "Modify existing robots.txt AI bot policy (risks unintended access changes)"
          critical: true
        - id: "schema-restructure"
          name: "Restructure existing JSON-LD to @graph pattern (risks breaking Rich Results)"
          critical: true
    - name: "Content Scaffolds (OUT_OF_SCOPE)"
      id_range: "Advisory tier"
      count: 3
      items:
        - id: "bluf-scaffold"
          name: "Structural placeholder for answer-first paragraph"
          critical: false
        - id: "eeat-scaffold"
          name: "Structural placeholder for E-E-A-T signals (author bio, organization description)"
          critical: false
        - id: "freshness-scaffold"
          name: "Structural placeholder for freshness signals (dateModified, last-reviewed)"
          critical: false

frameworks:
  - Astro
  - Next.js
  - Hugo
  - Universal (llms.txt, canonical, robots.txt, frontmatter)

modes:
  - name: default
    description: "SAFE fixes only. MODERATE and DANGEROUS are reported with recommendations."
  - name: "--auto"
    description: "SAFE + MODERATE fixes. Includes 3-layer validation per fix type. DANGEROUS still reported only."
  - name: "--all"
    description: "All tiers including DANGEROUS. Each DANGEROUS fix requires explicit user confirmation."
  - name: "--dry-run"
    description: "Read-only preview of all fixes across all tiers. No files modified."

agents: null

