problem: |
  Running `zuvo:geo-audit` produces a findings report — but applying GEO fixes safely is
  still error-prone. Schema @id changes can break existing Rich Results. Opening AI
  retrieval bots in robots.txt without understanding training vs retrieval distinction can
  have unintended consequences. `zuvo:geo-fix` reads the audit JSON and applies fixes
  in safety-tier order: SAFE (auto), MODERATE (validated), DANGEROUS (diff + confirm only).
  It deduplicates against `zuvo:seo-fix` output to prevent double-application of overlapping
  fixes (llms.txt, canonical, robots.txt), emits structural scaffolds for content findings
  that cannot be auto-fixed, and runs build verification after each batch. VERIFIED means
  the build exited 0 AND required artifacts exist — not just that logs looked positive.

how_it_works:
  - step: Load Findings and Dedup
    description: "Finds the latest geo-audit JSON in audit-results/, warns if older than 24 hours, and checks seo-fix output for already-applied overlapping fixes (llms-txt-add, robots-fix, canonical). Prints a tiered summary: SAFE / MODERATE / DANGEROUS plus deduped, scaffold, and insufficient-data counts."
  - step: Detect Framework and Targets
    description: "Detects stack directly (does not depend on geo-audit at runtime). Maps each finding's fix_type to framework-specific target files from the geo-fix registry. Applies context-aware safety upgrades: schema-org-add/schema-id-link upgrade to DANGEROUS if the target file has existing JSON-LD; robots-ai-allow upgrades to MODERATE if robots.txt has existing bot rules."
  - step: Apply Fixes
    description: "Applies fixes in tier order: SAFE (robots-ai-allow with no existing rules, canonical-add with no existing canonical, llms-txt-generate, sitemap-robots-ref, frontmatter-date-add), MODERATE (3-layer validation: file parse, framework convention, finding-specific post-condition), DANGEROUS (diff + risk explanation + explicit user confirmation per fix). OUT_OF_SCOPE findings emit structural scaffolds only — never body content."
  - step: Verify
    description: "Detects build command (astro build, next build, hugo) and runs a full build after fixes. Non-zero exit = FAIL even if logs look optimistic. For generated public files (llms.txt, sitemap.xml, robots.txt), checks the built artifact or local preview response. Failed post-build check triggers per-finding rollback, not a blind full revert."
  - step: Report and Update Backlog
    description: "Prints the GEO FIX REPORT with per-finding verdicts, estimated before/after score (confirmed fixes only), build result, dedup summary, manual_checks, policy_notes, risk_notes, and advisory_scaffolds. Updates memory/backlog.md accordingly."

output:
  artifact: "audit-results/geo-fix-YYYY-MM-DD.md and audit-results/geo-fix-YYYY-MM-DD.json"
  format: "GEO FIX REPORT block plus JSON v1.2 with per-finding status, estimated score improvement (confirmed fixes only), build_result, eta_minutes, manual_checks, policy_notes, advisory_scaffolds, risk_notes, network_override_risk, upgraded flag, and dedup records."
  sections:
    - "Findings summary (total / fixed / needs review / manual / scaffolded / deduped / out of scope / no template / insufficient data)"
    - "Estimated score (before → after, confirmed fixes only)"
    - "Build result"
    - "Dedup summary (already applied by seo-fix)"
    - "FIXED (auto-applied) — file and line reference"
    - "FIXED (validated) — validation outcome"
    - "NEEDS_REVIEW — warning explanation"
    - "MANUAL — exact diff and risk explanation"
    - "SCAFFOLDED — structural markers only, no body content"
    - "ALREADY APPLIED BY SEO-FIX"
    - "OUT_OF_SCOPE / NO_TEMPLATE / INSUFFICIENT_DATA"
    - "Next steps"

examples:
  - title: "Apply SAFE fixes from latest geo-audit"
    type: invocation
    command: "zuvo:geo-fix"
    result: |
      GEO FIX REPORT -- acme.com
      ----
      Findings: 18 total | 4 fixed | 3 needs review | 2 manual | 3 scaffolded | 1 deduped | ...
      Score:    41 -> 52 (estimated, confirmed fixes only)
      Build:    PASS
      Dedup:    1 finding already applied by seo-fix
      ----
      FIXED (auto-applied):
        G3: Generated llms.txt                public/llms.txt (new)          [VERIFIED] ~10 min
        G7: Added canonical to base layout    src/layouts/Layout.astro:12    [VERIFIED] ~5 min
        G8: Added Sitemap directive           public/robots.txt:1            [VERIFIED] ~5 min

  - title: "Apply SAFE and MODERATE fixes"
    type: invocation
    command: "zuvo:geo-fix --auto"
    result: "Applies all SAFE fixes plus MODERATE fixes (schema-org-add, schema-id-link, schema-article-add) with 3-layer validation. DANGEROUS fixes (robots-ai-policy-change, schema-restructure) still reported only."

  - title: "Dry run to preview all tiers"
    type: invocation
    command: "zuvo:geo-fix --dry-run"
    result: "Shows every fix that would be applied at each tier with target files, expected changes, and context-aware safety upgrades — without modifying any file."

  - title: "Fix a specific finding"
    type: invocation
    command: "zuvo:geo-fix --finding G2-schema-id-disconnected"
    result: "Targets only the G2-schema-id-disconnected finding. If the target file contains existing JSON-LD, applies the context-aware MODERATE→DANGEROUS upgrade and requires confirmation."

when_to_use: |
  Run `zuvo:geo-fix` after `zuvo:geo-audit` produces findings. It is the fix-application
  complement: geo-audit identifies what is broken, geo-fix applies the fixes that are safe
  to automate. Use default mode for the first pass (SAFE only), then `--auto` for MODERATE
  fixes after reviewing SAFE results. Run seo-fix first if you have both SEO and GEO
  findings — geo-fix will skip any fixes seo-fix already applied.

when_not_to_use: |
  Do not use `zuvo:geo-fix` as a substitute for `zuvo:geo-audit` — it requires a geo-audit
  JSON to exist and warns if older than 24 hours. For SEO fixes (sitemap, OG tags, meta),
  use `zuvo:seo-fix`. geo-fix does not handle content writing, BLUF restructuring, heading
  rewriting, statistics addition, anti-pattern removal, WordPress plugin configuration, or
  React SPA GEO improvements.

